<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Full Throttle | iRacing Sim</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-screen">
        <div class="setup-card">
            <h1 style="color:#F59E0B; font-size: 38px; margin:0; font-weight:900;">🏁 FULL THROTTLE</h1>
            <p style="color:#94A3B8; letter-spacing:2px; font-size:12px; margin-bottom:30px;">iRACING CAREER SIMULATOR</p>
            
            <input id="player-name" type="text" placeholder="ENTER DRIVER NAME..." maxlength="20">
            
            <button class="btn-primary" onclick="handleStartCareer()" style="width:100%; padding:18px;">
                START CAREER →
            </button>
        </div>
    </div>

    <div id="game-app" style="display:none;">
        <div id="header">
            <div class="header-left">
                <div id="display-name" style="font-size:22px; font-weight:900; color:#F59E0B; line-height:1;">--</div>
                <div id="display-tier" style="color:#94A3B8; font-size:12px; margin-top:5px; font-weight:700;">TIER 1</div>
            </div>
            <div class="header-right" style="text-align:right;">
                <div id="display-money" style="font-size:20px; font-weight:700; color:#FFF;">$0</div>
                <div id="display-wins" style="color:#F59E0B; font-size:12px; font-weight:700;">0 WINS</div>
            </div>
        </div>

        <div id="tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">DASH</button>
            <button class="tab-btn" onclick="switchTab('race')">RACE</button>
            <button class="tab-btn" onclick="switchTab('garage')">SHOP</button>
            <button class="tab-btn" onclick="switchTab('stats')">STATS</button>
        </div>

        <div id="game-content">
            </div>
    </div>

<script src="game.js"></script>
<script src="src/renderer.js"></script>
<script>
    // This starts the engine once the files are loaded
    window.onload = async () => {
        const hasSave = await loadGame();
        if (hasSave) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').style.display = 'flex';
            showTab('dashboard');
        }
    };
</script>

</body>
</html>
