<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Throttle Career Simulator</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f2f2f2; }
#game { max-width:1000px; margin:auto; background:white; padding:20px; box-shadow:0 0 15px rgba(0,0,0,0.2); }
header { display:flex; justify-content:space-around; background:#333; color:white; padding:10px 0; cursor:pointer; }
header div { flex:1; text-align:center; }
header .active { background:#555; }
.panel { display:none; padding:20px 0; }
#output { white-space:pre-line; margin-top:10px; }
button { margin:3px; padding:8px 15px; font-size:14px; cursor:pointer; }
.choice-btn { display:block; margin:3px 0; }
.blue-team { color:blue; font-weight:bold; }
</style>
</head>
<body>
<div id="game">
<header>
<div id="tabCareer" class="active">Career</div>
<div id="tabStandings">Standings</div>
<div id="tabSchedule">Schedule</div>
<div id="tabStats">Stats</div>
<div id="tabOptions">Options</div>
</header>

<div id="careerPanel" class="panel" style="display:block;">
<h2>Career Mode</h2>
<p id="playerStats">Loading...</p>
<button id="startSeasonBtn">Start Season</button>
<button id="nextRaceBtn" style="display:none">Run Next Race</button>
<div id="outputCareer"></div>
</div>

<div id="standingsPanel" class="panel">
<h2>Standings</h2>
<div id="standingsOutput"></div>
</div>

<div id="schedulePanel" class="panel">
<h2>Race Schedule</h2>
<div id="scheduleOutput"></div>
</div>

<div id="statsPanel" class="panel">
<h2>Player Stats</h2>
<div id="statsOutput"></div>
</div>

<div id="optionsPanel" class="panel">
<h2>Options</h2>
<p>Settings will go here.</p>
</div>
</div>

<script>
// ======================
// TAB LOGIC
// ======================
const tabs = ['Career','Standings','Schedule','Stats','Options'];
tabs.forEach(tab=>{
  document.getElementById('tab'+tab).addEventListener('click',()=>{
    tabs.forEach(t=>{
      document.getElementById('tab'+t).classList.remove('active');
      document.getElementById(t.toLowerCase()+'Panel').style.display='none';
    });
    document.getElementById('tab'+tab).classList.add('active');
    document.getElementById(tab.toLowerCase()+'Panel').style.display='block';
  });
});

// ======================
// DRIVER GENERATION
// ======================
const firstNames=["Tyler","Austin","Colton","Dylan","Chase","Logan","Cody","Hunter","Blake","Tanner","Wyatt"];
const lastNames=["Anderson","Baker","Barnes","Bennett","Brooks","Bryant","Campbell","Carter","Coleman","Collins"];
const nicknames=["Bubba","Crash","Smokey","Red","Lightning"];
const personalities=[
  {type:"Clean Veteran", aggression:0.25, consistency:0.9, fanBonus:2},
  {type:"Young Gun", aggression:0.65, consistency:0.6, fanBonus:3}
];
const qualifyingLines=["{driver} stunned the field for pole.","{driver} laid down a blistering lap."];
const raceVictoryLines=["{winner} dominated today's race.","{winner} survived chaos to win."];
const chaosLines=["A massive wreck shuffled the order.","Late race chaos turned the race upside down."];
const playerFinishLines=["{player} finished {position}.","{player} battled through the field to finish {position}."];

let teams=["Red","Blue","Green"];
let season={currentRace:0, totalRaces:5, drivers:[], races:[]};
let player={
  name:"Player",
  team:null,
  money:15000,
  reputation:0,
  health:100,
  stats:{wins:0,podiums:0,dnf:0,dq:0},
  relationships:{rivals:{},respect:{}}
};

const playerStatsEl = document.getElementById("playerStats");
const outputCareer = document.getElementById("outputCareer");

function updatePlayerStats(){
  playerStatsEl.innerText = `Money: $${player.money} | Reputation: ${player.reputation} | Health: ${player.health}% | Team: ${player.team}`;
}
updatePlayerStats();

function generateDriverName(){
  let first=firstNames[Math.floor(Math.random()*firstNames.length)];
  let last=lastNames[Math.floor(Math.random()*lastNames.length)];
  let name=first+" "+last;
  if(Math.random()<0.10){let letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ"; name=first+" "+letters[Math.floor(Math.random()*26)]+". "+last;}
  if(Math.random()<0.08){name=first+' "'+nicknames[Math.floor(Math.random()*nicknames.length)]+'" '+last;}
  if(Math.random()<0.12){name+=" Jr.";}
  return name;
}
function generatePersonality(){return personalities[Math.floor(Math.random()*personalities.length)];}
function generateDriver(team=null){
  let p=generatePersonality();
  return {
    name: generateDriverName(),
    age: 20+Math.floor(Math.random()*12),
    skill: Math.random()*0.35+0.65,
    aggression: p.aggression,
    consistency: p.consistency,
    reliability: Math.random()*0.2+0.8,
    personality: p.type,
    retired:false,
    team:team,
    relationships:{rivals:{}, respect:{}},
    stats:{wins:0,podiums:0,dnf:0,dq:0}
  };
}
function generateDriverField(count){
  let field=[], used=new Set();
  while(field.length<count){
    let team=teams[Math.floor(Math.random()*teams.length)];
    let d=generateDriver(team);
    if(!used.has(d.name)){used.add(d.name); field.push(d);}
  }
  return field;
}

// ======================
// RACE LOGIC
// ======================
function driverPerformance(d){return d.skill+(Math.random()-0.5)*0.3-(1-d.consistency)*(Math.random()*0.2);}
function checkMechanicalFailure(d){return Math.random()>d.reliability?"DNF":null;}
function checkCrash(d){return Math.random()<d.aggression*0.05?"DNF":null;}
function checkDQ(){return Math.random()<0.005?"DQ":null;}

function runRace(drivers){
  let results=[];
  for(let d of drivers){
    let status=checkMechanicalFailure(d)||checkCrash(d)||checkDQ();
    if(status){results.push({name:d.name,status:status,driverObj:d}); continue;}
    let score=driverPerformance(d);
    results.push({name:d.name,score:score,status:"Finished",driverObj:d});
  }
  results.sort((a,b)=>b.score-a.score);
  return results;
}
function generateQualifyingStory(driver){
  let line=qualifyingLines[Math.floor(Math.random()*qualifyingLines.length)];
  return line.replace("{driver}",driver);
}
function generateRaceSummary(winner,playerName,position){
  let lead=raceVictoryLines[Math.floor(Math.random()*raceVictoryLines.length)];
  let chaos=chaosLines[Math.floor(Math.random()*chaosLines.length)];
  let playerLine=playerFinishLines[Math.floor(Math.random()*playerFinishLines.length)];
  lead=lead.replace("{winner}",winner);
  playerLine=playerLine.replace("{player}",playerName).replace("{position}",position);
  return lead+" "+chaos+" "+playerLine;
}

// ======================
// POST-RACE INTERACTIONS
// ======================
function checkCloseFinishes(results){
  let closePairs=[];
  for(let i=0;i<results.length-1;i++){
    if(results[i].status==="Finished" && results[i+1].status==="Finished"){
      let gap=Math.abs(results[i].score-results[i+1].score);
      if(gap<=0.05){closePairs.push([results[i].driverObj, results[i+1].driverObj]);}
    }
  }
  return closePairs;
}
function showPostRaceInteractions(results){
  let closeDrivers=checkCloseFinishes(results);
  if(closeDrivers.length>0) outputCareer.innerHTML+="\n--- Post-Race Interactions ---\n";

  closeDrivers.forEach(pair=>{
    pair.forEach(d=>{
      if(d.name===player.name){
        let other=pair[0]===d?pair[1]:pair[0];
        let btnPraise=document.createElement("button");
        btnPraise.innerText=`Praise ${other.name}`;
        btnPraise.className="choice-btn";
        btnPraise.onclick=()=>{
          player.reputation+=2;
          d.relationships.respect[other.name]=(d.relationships.respect[other.name]||0)+5;
          other.relationships.respect[player.name]=(other.relationships.respect[player.name]||0)+5;
          updatePlayerStats();
          btnPraise.disabled=true;
        };
        let btnDig=document.createElement("button");
        btnDig.innerText=`Dig at ${other.name}`;
        btnDig.className="choice-btn";
        btnDig.onclick=()=>{
          player.reputation-=1;
          d.relationships.rivals[other.name]=(d.relationships.rivals[other.name]||0)+5;
          other.relationships.rivals[player.name]=(other.relationships.rivals[player.name]||0)+5;
          updatePlayerStats();
          btnDig.disabled=true;
        };
        outputCareer.appendChild(btnPraise);
        outputCareer.appendChild(btnDig);
      }
    });
  });

  results.forEach(r=>{
    let d=r.driverObj;
    if(d.name!==player.name && r.status==="Finished"){
      if(Math.random()<0.3){
        let message="";
        if(d.relationships.rivals[player.name] && d.relationships.rivals[player.name]>0){
          message=`${d.name} called out ${player.name} for aggressive racing!`;
          d.relationships.rivals[player.name]+=2;
        } else if(d.relationships.respect[player.name] && d.relationships.respect[player.name]>0){
          message=`${d.name} praised ${player.name} for clean racing!`;
          d.relationships.respect[player.name]+=2;
        } else {
          message=`${d.name} commented on ${player.name}'s performance.`;
        }
        outputCareer.innerHTML+="\n"+message;
      }
    }
  });
}

// ======================
// SEASON START & RACE BUTTONS
// ======================
const startSeasonBtn=document.getElementById("startSeasonBtn");
const nextRaceBtn=document.getElementById("nextRaceBtn");

startSeasonBtn.addEventListener("click",()=>{
  startSeasonBtn.style.display="none";
  player.team=teams[Math.floor(Math.random()*teams.length)];
  season.drivers=generateDriverField(20);
  season.races=Array(season.totalRaces).fill(null);
  outputCareer.innerText="Season started! 20 drivers on the grid.";
  nextRaceBtn.style.display="inline";
  updateAllPanels();
});

nextRaceBtn.addEventListener("click",()=>{
  if(season.currentRace>=season.totalRaces){
    generateSeasonSummary();
    nextRaceBtn.style.display="none";
    return;
  }

  let raceDrivers=[...season.drivers];
  let pole=raceDrivers[Math.floor(Math.random()*raceDrivers.length)].name;
  let qualStory=generateQualifyingStory(pole);
  let results=runRace(raceDrivers);
  let winner=results.find(r=>r.status==="Finished")?.name||results[0].name;
  let playerPos=Math.floor(Math.random()*results.length)+1;
  let raceStory=generateRaceSummary(winner,player.name,playerPos);

  let resultsText="Race Results:\n";
  results.forEach((r,i)=>{
    let d=r.driverObj;
    let teamTag=d.team===player.team ? " TEAM" : "";
    let nameDisplay=d.team===player.team ? `<span class='blue-team'>[${d.team}] ${d.name}</span>` : d.name;
    resultsText+=(i+1)+". "+nameDisplay+" - "+r.status+teamTag+"\n";
  });

  outputCareer.innerHTML=`Race ${season.currentRace+1} Qualifying:\n${qualStory}\n\n${resultsText}${raceStory}\n`;
  showPostRaceInteractions(results);
  season.currentRace++;
  updateAllPanels();
});

// ======================
// PANELS
// ======================
function updateStandings(){
  let output = document.getElementById("standingsOutput");
  let sorted = [...season.drivers].sort((a,b)=>{
    let pointsA = (a.stats?.wins||0)*25 + (a.stats?.podiums||0)*10;
    let pointsB = (b.stats?.wins||0)*25 + (b.stats?.podiums||0)*10;
    return pointsB - pointsA;
  });
  let text="Driver Standings:\n";
  sorted.forEach((d,i)=>{
    let nameDisplay=d.team===player.team ? `<span class='blue-team'>[${d.team}] ${d.name}</span>` : d.name;
    let teamTag=d.team===player.team ? " TEAM" : "";
    let pts=(d.stats?.wins||0)*25 + (d.stats?.podiums||0)*10;
    text += `${i+1}. ${nameDisplay} - Points: ${pts}${teamTag}\n`;
  });
  output.innerHTML=text;
}
function updateSchedule(){
  let output = document.getElementById("scheduleOutput");
  let text="Upcoming Races:\n";
  for(let i=season.currentRace;i<season.totalRaces;i++){
    text += `Race ${i+1} - TBD Location\n`;
  }
  output.innerText=text;
}
function updateStats(){
  let output = document.getElementById("statsOutput");
  let text=`Player Stats:\nWins: ${player.stats.wins}\nPodiums: ${player.stats.podiums}\nDNFs: ${player.stats.dnf}\nDQs: ${player.stats.dq}\nReputation: ${player.reputation}\nMoney: $${player.money}\n`;
  output.innerText=text;
}
function updateAllPanels(){updateStandings(); updateSchedule(); updateStats();}

// ======================
// TUTORIAL
// ======================
let tutorialShown = false;
function showTutorial(){
  if(tutorialShown) return;
  tutorialShown = true;
  let tutorialMsg = `Welcome to Full Throttle Career Simulator!

- Enter your driver name and hometown at the start.
- Each race consists of qualifying and the main race.
- Drivers have rivalries and respect, which can be affected by close finishes.
- Teammates are highlighted in blue and marked TEAM.
- After each race, you can choose to Praise or Dig at opponents you had close finishes with.
- Keep track of your stats in the Stats tab and season standings in Standings.
- You can skip this tutorial anytime. Enjoy!`;
  alert(tutorialMsg);
}
const optionsPanel = document.getElementById("optionsPanel");
let tutorialBtn = document.createElement("button");
tutorialBtn.innerText = "Show Tutorial";
tutorialBtn.onclick = showTutorial;
optionsPanel.appendChild(tutorialBtn);

// ======================
// PLAYER ENTRY
// ======================
function playerEntry(){
  let name = prompt("Enter your driver name:", "Player");
  if(name) player.name = name;
  let hometown = prompt("Enter your hometown:", "Hometown");
  if(hometown) player.hometown = hometown;
  updatePlayerStats();
}
playerEntry();
showTutorial();

// ======================
// POST-SEASON SUMMARY
// ======================
function generateSeasonSummary(){
  let champ = season.drivers.sort((a,b)=>{
    let ptsA = (a.stats?.wins||0)*25 + (a.stats?.podiums||0)*10;
    let ptsB = (b.stats?.wins||0)*25 + (b.stats?.podiums||0)*10;
    return ptsB - ptsA;
  })[0];

  let summary = `--- Season Summary ---\nChampion: ${champ.name} (${champ.team})\nPlayer: ${player.name} finished with ${player.stats.wins} wins, ${player.stats.podiums} podiums, ${player.stats.dnf} DNFs, ${player.stats.dq} DQs.\n`;
  
  summary += `Rivalries built: ${Object.keys(player.relationships.rivals||{}).length}\n`;
  summary += `Respect gained: ${Object.keys(player.relationships.respect||{}).length}\n`;
  summary += `Thanks for playing Full Throttle Career Simulator!`;

  outputCareer.innerText = summary;
}
</script>
</body>
</html>
