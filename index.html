<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Throttle RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;background:#04060E;color:#E2E8F0;font-size:16px;line-height:1.45}
input,textarea,select,button{font-family:inherit;font-size:15px}
input,select{background:#131822;border:1px solid #64748B;border-radius:6px;color:#F9FAFB;padding:8px 11px;width:100%}
input:focus,select:focus{outline:2px solid #D97706;outline-offset:1px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0B0F1A}::-webkit-scrollbar-thumb{background:#64748B;border-radius:3px}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#header{background:#080C14;border-bottom:2px solid #1E2433;padding:10px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:20px;max-width:860px;margin:0 auto;width:100%}
#tabs{display:flex;gap:4px;padding:10px 20px 0;background:#080C14;border-bottom:1px solid #1E2433;overflow-x:auto;flex-shrink:0}
.tab{padding:8px 16px;border-radius:6px 6px 0 0;cursor:pointer;font-weight:700;font-size:14px;color:#64748B;white-space:nowrap;border:none;background:none}
.tab.active{background:#0D1117;color:#F59E0B;border-bottom:2px solid #F59E0B}
.tab:hover:not(.active){color:#94A3B8}

/* Cards */
.card{background:#0D1117;border:1px solid #1E2433;border-radius:10px;padding:18px;margin-bottom:14px}
.card-title{font-size:12px;color:#94A3B8;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:12px;font-weight:700}
.page-title{font-size:28px;font-weight:900;color:#F9FAFB;margin-bottom:4px}
.page-sub{font-size:14px;color:#94A3B8;margin-bottom:18px}

/* Buttons */
button{border:none;border-radius:6px;cursor:pointer;font-weight:700;transition:filter 0.15s}
button:not(:disabled):hover{filter:brightness(1.12)}
button:disabled{opacity:0.35;cursor:not-allowed}
.btn-primary{background:#D97706;color:#fff;padding:10px 20px}
.btn-secondary{background:#1E2433;color:#E2E8F0;padding:10px 20px}
.btn-success{background:#065F46;color:#6EE7B7;padding:10px 20px}
.btn-danger{background:#7F1D1D;color:#FCA5A5;padding:10px 20px}
.btn-ghost{background:transparent;color:#94A3B8;padding:10px 20px;border:1px solid #1E2433}
.btn-lg{font-size:18px;padding:14px 32px}
.btn-sm{font-size:13px;padding:6px 14px}
.btn-xl{font-size:22px;padding:18px 48px;border-radius:10px;letter-spacing:0.05em}

/* Stat bars */
.stat-bar-wrap{margin-bottom:10px}
.stat-bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
.stat-bar-track{height:8px;background:#1E2433;border-radius:4px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:4px;transition:width 0.4s}

/* Race beat cards */
.beat-card{background:#060A10;border:1px solid #1E2433;border-radius:10px;padding:16px;margin-bottom:12px;animation:fadeIn 0.3s ease}
.beat-card.good{border-color:#10B98144}
.beat-card.bad{border-color:#EF444444}
.beat-card.neutral{border-color:#F59E0B44}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.beat-icon{font-size:28px;margin-bottom:8px}
.beat-title{font-size:16px;font-weight:800;color:#F9FAFB;margin-bottom:4px}
.beat-desc{font-size:14px;color:#94A3B8;line-height:1.55;margin-bottom:12px}
.beat-choices{display:flex;gap:8px;flex-wrap:wrap}
.choice-btn{background:#131822;border:1px solid #1E2433;border-radius:8px;padding:10px 14px;cursor:pointer;font-size:13px;color:#E2E8F0;font-family:inherit;font-weight:600;flex:1;min-width:140px;text-align:left;transition:all 0.15s}
.choice-btn:hover{border-color:#F59E0B;color:#F59E0B;background:#131822}
.choice-btn .choice-hint{font-size:11px;color:#64748B;margin-top:3px;font-weight:400}

/* Result screen */
.result-pos{font-size:72px;font-weight:900;line-height:1;text-align:center}
.result-track{font-size:18px;color:#94A3B8;text-align:center;margin-bottom:20px}

/* Rival card */
.rival-card{display:flex;gap:12px;align-items:center;padding:10px;background:#060A10;border-radius:8px;border:1px solid #1E2433;margin-bottom:8px}
.rival-avatar{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;font-weight:900}

/* Setup screen */
#setup{position:fixed;inset:0;background:#04060E;display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
#setup.hidden{display:none}
.setup-card{background:#0D1117;border:1px solid #1E2433;border-radius:14px;padding:32px;max-width:480px;width:100%}

/* Upgrade card */
.upgrade-card{background:#060A10;border:1px solid #1E2433;border-radius:8px;padding:14px;margin-bottom:10px}
.upgrade-pips{display:flex;gap:4px;margin-top:6px}
.pip{width:18px;height:8px;border-radius:2px;background:#1E2433}
.pip.filled{background:#F59E0B}

/* Modal */
#modal-overlay{position:fixed;inset:0;background:#000000bb;display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
#modal-overlay.hidden{display:none}
#modal-box{background:#0D1117;border:1px solid #1E2433;border-radius:12px;padding:28px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-size:22px;font-weight:900;color:#F9FAFB;margin-bottom:8px}
.modal-sub{font-size:14px;color:#94A3B8;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap}

/* Header stats */
.hstat{text-align:center}
.hstat-val{font-size:18px;font-weight:900;color:#F59E0B}
.hstat-lbl{font-size:11px;color:#64748B;text-transform:uppercase;letter-spacing:0.1em}

/* Progress arc */
.tier-badge{display:inline-flex;align-items:center;gap:6px;background:#1E2433;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:700;color:#F59E0B}

/* Notification toast */
#toast{position:fixed;bottom:24px;right:24px;background:#0D1117;border:1px solid #1E2433;border-radius:10px;padding:14px 18px;max-width:320px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
#toast.show{opacity:1}

/* Grid helpers */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.mini-stat{background:#060A10;border-radius:7px;padding:10px;border:1px solid #1E2433;text-align:center}
.mini-stat-val{font-size:20px;font-weight:900}
.mini-stat-lbl{font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}

/* Podium animation */
@keyframes popIn{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.pop-in{animation:popIn 0.5s ease forwards}

/* Position color */
.pos-1{color:#F59E0B}.pos-2{color:#9CA3AF}.pos-3{color:#CD7F32}.pos-good{color:#10B981}.pos-bad{color:#EF4444}
</style>
</head>

<!-- Modal -->

const RELATIONSHIP_TYPES = {
  RIVAL: { id: 'rival', name: 'Rival', color: '#EF4444', icon: '🔥' },
  NEUTRAL: { id: 'neutral', name: 'Neutral', color: '#64748B', icon: '⚪' },
  FRIENDLY: { id: 'friendly', name: 'Friendly', color: '#10B981', icon: '🤝' },
  CLOSE_FRIEND: { id: 'close_friend', name: 'Close Friend', color: '#059669', icon: '💚' },
  TEAMMATE: { id: 'teammate', name: 'Teammate', color: '#3B82F6', icon: '👥' }
};

function initializeRelationships(drivers) {
  const relationships = {};
  
  // Initialize all driver pairs as neutral
  for (let i = 0; i < drivers.length; i++) {
    for (let j = i + 1; j < drivers.length; j++) {
      const key1 = `${drivers[i].name}-${drivers[j].name}`;
      const key2 = `${drivers[j].name}-${drivers[i].name}`;
      
      // 70% neutral, 15% friendly, 10% rival, 5% close friend
      const rand = Math.random();
      let type = 'NEUTRAL';
      if (rand < 0.05) type = 'CLOSE_FRIEND';
      else if (rand < 0.20) type = 'FRIENDLY';
      else if (rand < 0.30) type = 'RIVAL';
      
      relationships[key1] = { type, intensity: type === 'RIVAL' ? rand(3, 7) : rand(1, 4) };
      relationships[key2] = { type, intensity: type === 'RIVAL' ? rand(3, 7) : rand(1, 4) };
    }
  }
  
  return relationships;
}

function getRelationship(driver1, driver2) {
  const key = `${driver1}-${driver2}`;
  return G.relationships?.[key] || { type: 'NEUTRAL', intensity: 0 };
}

function updateRelationship(driver1, driver2, changeType, intensityChange = 0) {
  const key1 = `${driver1}-${driver2}`;
  const key2 = `${driver2}-${driver1}`;
  
  if (!G.relationships) G.relationships = {};
  
  if (!G.relationships[key1]) {
    G.relationships[key1] = { type: 'NEUTRAL', intensity: 0 };
    G.relationships[key2] = { type: 'NEUTRAL', intensity: 0 };
  }
  
  G.relationships[key1].type = changeType;
  G.relationships[key2].type = changeType;
  
  G.relationships[key1].intensity = clamp(G.relationships[key1].intensity + intensityChange, 0, 10);
  G.relationships[key2].intensity = clamp(G.relationships[key2].intensity + intensityChange, 0, 10);
}

function getRelationshipDisplay(driver1, driver2) {
  const rel = getRelationship(driver1, driver2);
  return RELATIONSHIP_TYPES[rel.type] || RELATIONSHIP_TYPES.NEUTRAL;
}

function checkSponsorExpectations() {
  if (!G.contract) return null;
  
  const sponsor = SPONSORS.find(s => s.id === G.contract.sponsorId);
  if (!sponsor) return null;
  
  const seasonWins = G.seasonResults.filter(r => r.pos === 1 && !r.dnf).length;
  const seasonTop5s = G.seasonResults.filter(r => r.pos <= 5 && !r.dnf).length;
  const seasonPoints = G.points;
  
  const expectations = sponsor.expectations;
  let status = 'meeting';
  let message = sponsor.praise;
  
  if (seasonWins < expectations.minWins || seasonTop5s < expectations.minTop5s || seasonPoints < expectations.minPoints) {
    status = 'warning';
    message = sponsor.warning;
  }
  
  // Check for cancellation (too poor performance)
  const performanceRatio = (seasonWins / Math.max(1, G.seasonResults.length)) + 
                        (seasonTop5s / Math.max(1, G.seasonResults.length));
  
  if (performanceRatio < 0.3 && G.seasonResults.length >= 5) {
    status = 'cancelled';
    message = sponsor.cancel;
  }
  
  return { status, message, sponsor };
}

  if (check && check.status === 'cancelled') {

      title: 'Sponsorship Ended',
      message: `${check.sponsor.name} has ended your partnership: ${check.message}`,

      type: 'sponsor',
      title: 'Sponsor Concern',
      message: `${check.sponsor.name}: ${check.message}`,

}

function getEffectiveStat(stat) {
  let val = G.stats[stat];

  if (stat==='consistency') val += G.car.reliability;
  // Team car bonus — better team = better machinery
  if (G.contract) val += G.contract.carBonus||0;
  return clamp(val, 1, 15);
}

function generateSchedule() {
  const tier = getTier();
  const trackPool = TRACKS.filter(t => {
    if (G.tier <= 2) return t.type === 'short';
    if (G.tier === 3) return t.type === 'short' || t.type === 'mid';
    if (G.tier === 4) return t.type !== 'super' || Math.random() < 0.3;
    return true; // tier 5: anything goes
  });
  const shuffled = [...trackPool].sort(()=>Math.random()-0.5);
  return Array.from({length:tier.races}, (_,i) => ({
    round: i+1,
    track: shuffled[i % shuffled.length],
    result: null,
  }));
}

function startSeason() {
  G.schedule = generateSchedule();
  G.race = 1;
  G.points = 0;
  G.seasonResults = [];
  G.lastTraining = 0; // reset training cooldown for new season
  // Generate AI field for standings
  G.aiField = generateAIField();

function generateAIField() {
  const tier = getTier();
  const count = tier.fieldSize - 1;
  const field = [];
  // Always include the named rivals first so they appear in standings
  const rivalNames = new Set((G.rivals||[]).map(r=>r.name));
  (G.rivals||[]).forEach(r => {
    field.push({
      name: r.name,
      points: 0, wins: 0, top5s: 0, starts: 0,
      skill: clamp(rand(4,11),1,15),
      isRival: true, rivalId: r.id,
    });
  });
  // Fill rest with generic AI drivers
  while (field.length < count) {
    // 85% chance for US driver, 15% for international in regular races
    const region = Math.random() < 0.85 ? 'US' : pick(['EU','AF','AS','SA','CA','AU']);
    const name = getRegionalName(region);
    if (!rivalNames.has(name)) {
      field.push({ 
        name, 
        region: region,
        points:0, 
        wins:0, 
        top5s:0, 
        starts:0, 
        skill:clamp(rand(3,12),1,15) 
      });
      rivalNames.add(name);
    }
  }
  return field.slice(0, count);
}

function getCurrentRace() {

// Generate narrative beats based on race length and type
function generateRaceBeats(race = null) {
  const pool = [...BEAT_EVENTS];
  let count, beatMultiplier = 1;
  
  // Scale beats based on race characteristics
  if (race) {
    if (race.type === 'endurance') {
      // Endurance races have many more beats
      count = rand(8, 15);
      beatMultiplier = 2.5;
    } else if (race.length >= 2.0) {
      // Superspeedways
      count = rand(5, 8);
      beatMultiplier = 1.5;
    } else if (race.length >= 1.0) {
      // Intermediate tracks
      count = rand(4, 6);
      beatMultiplier = 1.2;
    } else {
      // Short tracks
      count = rand(3, 5);
      beatMultiplier = 1.0;
    }
    
    // Special events get extra beats
    if (race.internationalRatio && race.internationalRatio > 0.5) {
      count += rand(2, 4); // More international drama
    }
  } else {
    // Default for regular races
    count = rand(3, 5);
    beatMultiplier = 1.0;
  }
  
  const shuffled = pool.sort(()=>Math.random()-0.5);
  
  // Separate restart beats — these must always be last
  const restarts  = shuffled.filter(e=>e.type==='restart');
  const cautions  = shuffled.filter(e=>e.type==='caution');
  const incidents = shuffled.filter(e=>e.type==='incident');
  const others    = shuffled.filter(e=>e.type!=='caution'&&e.type!=='incident'&&e.type!=='restart');
  
  // Build the sequence: caution first, incidents + others in middle, restart at end if included
  const middle = [...incidents, ...others].sort(()=>Math.random()-0.5);
  const selected = [pick(cautions), ...middle].filter(Boolean).slice(0, Math.floor(count * beatMultiplier) - (restarts.length?1:0));
  
  // 40% chance to include a GWC finish as the final beat (higher for longer races)
  const gwcChance = race?.type === 'endurance' ? 0.8 : race?.length >= 2.0 ? 0.6 : 0.4;
  if (restarts.length && Math.random() < gwcChance) selected.push(pick(restarts));
  
  return selected;
}

// Simulate a race given accumulated beat outcomes
function simulateFinalPosition(beatDeltas, fieldSize) {
  const tier = getTier();
  const spd  = getEffectiveStat('speed');
  const rc   = getEffectiveStat('racecraft');
  const con  = getEffectiveStat('consistency');
  const total = spd + rc + con; // max 45

  // Base position range — normalized to field
  // At stat total 6 (min): expect ~60-80% of field
  // At stat total 30 (max): expect top 25%
  // Difficulty: authentic — wins should be earned, not handed out
  // At starting stats (total ~6): expect ~65-80th percentile of field
  // At max stats (total ~30+): expect top 15-25%
  const statFactor = Math.pow(total / 45, 0.7); // gentler curve, harder floor
  const noise = randF(-0.15, 0.15);
  const basePctile = clamp(1 - (statFactor * 0.80 + noise), 0.05, 0.95);
  let basePos = Math.round(basePctile * fieldSize);
  basePos = clamp(basePos, 1, fieldSize);

  // Apply beat deltas — but cap their influence so stats still matter
  const totalDelta = beatDeltas.reduce((a,b)=>a+b, 0);
  let finalPos = clamp(basePos + Math.round(totalDelta * 0.8), 1, fieldSize);

  // DNF check — starts at 18% for a fresh car, drops with reliability upgrades
  const dnfChance = Math.max(0.03, 0.18 - (con * 0.012));
  const dnf = Math.random() < dnfChance;
  if (dnf) finalPos = fieldSize - rand(0, Math.floor(fieldSize * 0.15));

  return { pos: finalPos, dnf, fieldSize };
}

function calcPrize(pos, fieldSize) {
  const tier = getTier();
  const gross = pos===1 ? tier.winPrize : Math.floor(tier.basePrize * Math.max(0.05, 0.65-((pos-2)/(fieldSize-2))*0.60));
  // Apply team prize share if under contract
  const share = G.contract ? G.contract.prizeShare : 1.0;
  return Math.floor(gross * share);
}
function calcSalary() {
  // Team pays per-race salary on top of prize share
  return G.contract ? G.contract.salaryPerRace : 0;
}

function calcPoints(pos, dnf) {
  if (dnf) return 0;
  const pts = [50,40,35,30,27,24,21,18,15,12,10,8,6,4,2,1];
  return pts[Math.min(pos-1, pts.length-1)] || 1;
}

function processRaceResult(pos, fieldSize, dnf) {
  const race = getCurrentRace();
  if (!race) return;

  const prize = dnf ? 0 : calcPrize(pos, fieldSize);
  const pts   = calcPoints(pos, dnf);
  const tier  = getTier();

  // Entry fee (indie pays full, team covers it if under contract)
  if (!G.contract) G.money -= tier.entryFee;
  G.money += prize;
  // Team salary bonus
  const salary = calcSalary();
  if (salary > 0) G.money += salary;
  G.points += pts;
  G.starts++;
  if (!dnf && pos===1) G.wins++;
  if (!dnf && pos<=5)  G.top5s++;

  // Rep/fans - tier based calculations
  let repGain = 0, fanGain = 0;
  const currentTier = getTier();
  
  // Base fan gains by tier
  const tierFanMultipliers = {
    1: { win: [100, 250], top3: [50, 120], top5: [20, 60], other: [0, 20] },
    2: { win: [200, 500], top3: [100, 250], top5: [40, 120], other: [0, 40] },
    3: { win: [500, 1200], top3: [250, 600], top5: [100, 300], other: [0, 100] },
    4: { win: [1200, 3000], top3: [600, 1500], top5: [250, 750], other: [0, 250] },
    5: { win: [3000, 8000], top3: [1500, 4000], top5: [600, 2000], other: [0, 500] }
  };
  
  const fanRange = tierFanMultipliers[currentTier.id] || tierFanMultipliers[1];
  
  if (dnf) { 
    repGain = -2; 
    fanGain = -rand(50, 200); // Lose fans when DNF
  } else if (pos === 1) { 
    repGain = rand(4, 8) + currentTier.id; 
    fanGain = rand(...fanRange.win); 
  } else if (pos <= 3) { 
    repGain = rand(2, 5) + Math.floor(currentTier.id / 2); 
    fanGain = rand(...fanRange.top3); 
  } else if (pos <= 5) { 
    repGain = rand(1, 3) + Math.floor(currentTier.id / 3); 
    fanGain = rand(...fanRange.top5); 
  } else if (pos > Math.floor(fieldSize * 0.6)) { 
    repGain = -1; 
    fanGain = rand(...fanRange.other); 
  } else {
    repGain = 0; 
    fanGain = rand(...fanRange.other); 
  }
  
  G.rep = Math.max(0, G.rep + repGain);
  G.fans = Math.max(0, G.fans + fanGain);

  // Store result
  race.result = { pos, fieldSize, dnf, prize, pts, repGain, fanGain };
  G.seasonResults.push({ round:race.round, track:race.track.name, pos, fieldSize, dnf, pts });
  G.raceHistory.push({ season:G.season, tier:G.tier, track:race.track.name, pos, fieldSize, dnf });
  G.log.unshift(`[S${G.season} R${race.round}] ${race.track.name}: ${dnf?'DNF':`P${pos}/${fieldSize}`} | ${fmtMoney(prize)} | +${pts}pts`);
  if (G.log.length > 100) G.log = G.log.slice(0, 100);

  // Simulate AI field results for this race
  if (G.aiField && G.aiField.length) {
    // Assign random positions to all AI drivers (excluding player's position)
    const availablePos = [];
    for (let i=1; i<=fieldSize; i++) { if (i!==pos) availablePos.push(i); }
    availablePos.sort(()=>Math.random()-0.5);
    G.aiField.forEach((ai, idx) => {
      const aiPos = availablePos[idx] || fieldSize;
      const aiDnf = Math.random() < 0.12;
      const aiPts = calcPoints(aiDnf ? fieldSize : aiPos, aiDnf);
      ai.points += aiPts;
      ai.starts++;
      if (!aiDnf && aiPos === 1) ai.wins++;
      if (!aiDnf && aiPos <= 5)  ai.top5s++;
    });
  }

  // Rival reactions
  updateRivalHeat(pos, fieldSize);

  // Story triggers
  checkStoryTriggers();

  // Advance race counter
  G.race++;

  // Check season end
  const remaining = G.schedule.filter(r=>!r.result).length;
  if (remaining === 0) endSeason();

  saveGame();
}

function updateRivalHeat(pos, fieldSize) {
  G.rivals.forEach(r => {
    r.interactions++;
    if (pos <= 3) r.heat = Math.min(10, r.heat + 1);
    if (pos === 1) r.defeated++;
    // Random trash talk chance
    if (pos <= Math.floor(fieldSize*0.4) && Math.random() < 0.35) {
      const msg = pick(r.trash);
      G.notifications.push({ type:'rival', rival:r.name, icon:r.icon, msg, id:uid() });
    }
  });
}

function checkStoryTriggers() {
  const triggers = [
    { id:'first_win',  cond: G.wins === 1 },
    { id:'five_wins',  cond: G.wins === 5 },
    { id:'ten_wins',   cond: G.wins === 10 },
  ];
  triggers.forEach(t => {
    if (t.cond && !G.storyTriggered.includes(t.id)) {
      G.storyTriggered.push(t.id);
      const evt = STORY_EVENTS.find(e=>e.trigger===t.id);
      if (evt) {
        G.rep   += evt.repBonus;
        G.fans  += evt.fanBonus;
        G.notifications.push({ type:'story', ...evt, id:uid() });
      }
    }
  });
}

  for (let i=0;i<count;i++) {
    const quality = pick(qualities);
    const mult = {backmarker:0.6,midfield:1.0,competitive:1.4,'top-team':1.9}[quality];
    // Pick a team name not already used in this offer pool
    const availableNames = names.filter(n=>!usedNames.has(n));
    const teamName = availableNames.length ? pick(availableNames) : `Team ${uid().slice(0,4)}`;
    usedNames.add(teamName);
    const seasons = rand(1, quality==='top-team'?3:2);
    // Salary: team pays driver per race
    const salaryPerRace = Math.floor(tier.basePrize * mult * 0.3 * randF(0.8,1.2));
    // Prize share: driver keeps X% of prize money
    const prizeShare = {backmarker:0.55,midfield:0.68,competitive:0.78,'top-team':0.88}[quality];
    // Car bonus to stats
    const carBonus = {backmarker:0,midfield:1,competitive:2,'top-team':3}[quality];
    offers.push({ id:uid(), teamName, quality, seasons, salaryPerRace, prizeShare, carBonus, tier:G.tier });
  }
  return offers;
}

function doSignContract(offer) {
  G.contract = { ...offer, racesCompleted:0, seasonsCompleted:0, warnings:0 };
  G.contractOffers = [];
  G.money += offer.salaryPerRace * 3; // signing bonus = 3 race salaries
  addNotification({
    type:'story',
    title:`✍️ Signed with ${offer.teamName}`,
    desc:`${QUALITY_LABEL[offer.quality]}. ${offer.seasons} season deal. Signing bonus paid. Let us go to work.`,
  });
  saveGame(); renderTab();
}

function doGoIndie() {
  G.contract = null;
  G.contractOffers = [];
  addNotification({
    type:'story',
    title:'🔧 Running Independent',
    desc:'No team. No salary. No obligations. You pay your own way and keep what you earn. Prove you belong.',
  });
  saveGame(); renderTab();
}

function addNotification(n) {
  if (!G.notifications) G.notifications = [];
  G.notifications.push({...n, id:uid()});
}

function endSeason() {
  // Season standings calc
  const pts = G.seasonResults.reduce((a,r)=>a+r.pts,0);
  const wins = G.seasonResults.filter(r=>r.pos===1).length;

  // Build final standings snapshot
  const playerStandingRow = {
    name: G.name, points: G.points,
    wins, top5s: G.seasonResults.filter(r=>r.pos<=5&&!r.dnf).length,
    starts: G.seasonResults.length, isPlayer:true,
  };
  const allStandings = [playerStandingRow, ...(G.aiField||[]).map(ai=>({...ai,isPlayer:false}))]
    .sort((a,b)=>b.points-a.points||b.wins-a.wins);
  const playerFinalPos = allStandings.findIndex(r=>r.isPlayer)+1;

  G.seasonHistory.push({
    season: G.season, tier: G.tier,
    races: G.seasonResults.length,
    wins, points: pts,
    money: G.money, rep: G.rep,
    finalPos: playerFinalPos,
    standings: allStandings.slice(0, 10), // top 10 for display
  });

  // Merch revenue
  const merch = Math.floor(G.fans * 0.15);
  if (merch > 0) { G.money += merch; }

  // Check tier promotion
  checkPromotion();

  // Generate fresh contract offers for new season
  G.contractOffers = generateContractOffers();
  // Tick contract seasons
  if (G.contract) {
    G.contract.seasonsCompleted = (G.contract.seasonsCompleted||0)+1;
    if (G.contract.seasonsCompleted >= G.contract.seasons) {
      addNotification({type:'story',title:'📋 Contract Expired',desc:`Your deal with ${G.contract.teamName} is up. Check the Team tab for new offers.`});
      G.contract = null;
    }
  }

  G.season++;
  G.race = 1;
  G.schedule = null;
  G.seasonResults = [];
}

function checkPromotion() {
  if (G.tier >= 5) return;
  const next = TIERS[G.tier];
  const wins = G.raceHistory.filter(r=>r.tier===G.tier&&r.pos===1).length;
  if (wins >= next.reqWins && G.rep >= next.reqRep) {
    G.tier++;
    G.rivals = [...G.rivals.slice(-2), ...generateRivals(G.tier)].slice(0,5);
    const tierEvt = STORY_EVENTS.find(e=>e.trigger===`tier${G.tier}`);
    if (tierEvt && !G.storyTriggered.includes(`tier${G.tier}`)) {
      G.storyTriggered.push(`tier${G.tier}`);
      G.rep   += tierEvt.repBonus;
      G.fans  += tierEvt.fanBonus;
      G.notifications.push({ type:'story', ...tierEvt, id:uid() });
    }
  }
}

// ─── UI HELPERS ─────────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') el.className = v;
    else if (k === 'style' && typeof v==='object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat(Infinity).forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}

function mkBtn(text, cls, onClick, disabled=false) {
  const b = h('button', {className:cls, onClick}, text);
  if (disabled) b.disabled = true;
  return b;
}

function statBar(label, val, max=10, color='#F59E0B') {
  const pct = Math.round((val/max)*100);
  return h('div',{className:'stat-bar-wrap'},
    h('div',{className:'stat-bar-label'},
      h('span',{style:{color:'#94A3B8'}},label),
      h('span',{style:{color,fontWeight:700}},`${val}/${max}`),
    ),
    h('div',{className:'stat-bar-track'},
      h('div',{className:'stat-bar-fill',style:{width:`${pct}%`,background:color}}),
    ),
  );
}

function pipRow(label, icon, level, maxLevel=5) {
  const pips = Array.from({length:maxLevel},(_,i)=>
    h('div',{className:`pip${i<level?' filled':''}`})
  );
  return h('div',null,
    h('div',{style:{fontSize:'13px',color:'#94A3B8',marginBottom:'4px'}},`${icon} ${label}`),
    h('div',{className:'upgrade-pips'},...pips),
  );
}

function posColor(pos, fs) {
  if (pos===1) return '#F59E0B';
  if (pos<=3)  return '#10B981';
  if (pos<=Math.floor(fs*0.4)) return '#3B82F6';
  if (pos>Math.floor(fs*0.65)) return '#EF4444';
  return '#94A3B8';
}

let modalStack = [];
function openModal(content) {
  const box = document.getElementById('modal-box');
  box.innerHTML = '';
  box.appendChild(content);

}
function closeModal(e) {

  document.getElementById('modal-overlay').classList.add('hidden');
}
function closeModalDirect() {

}

    ));

  if (cr.beatIndex < cr.beats.length) {

        choice.text,

      );

    f.appendChild(h('div',{style:{textAlign:'center',padding:'24px 0'}},

      mkBtn('See Final Result 🏁','btn-primary btn-lg',finishRace),

function resolveBeat(beat, choice) {
  const cr = G.currentRace;
  const statVal = getEffectiveStat(choice.stat);
  const statBonus = (statVal - 5) * 0.03; // -15% to +30% modifier
  const success = Math.random() < (choice.roll + statBonus);

  let delta = 0;
  let outcomeText = '';
  let outcome = 'neutral';

  if (choice.effect === 'pos_hold') {
    if (success) {
      delta = rand(-1, 1);
      outcomeText = '✓ Held position.';
      outcome = 'good';
    } else {
      delta = rand(-2, 0);
      outcomeText = '✗ Lost a couple spots.';
      outcome = 'bad';
    }
  } else if (choice.effect === 'pos_change') {
    const [minD, maxD] = choice.delta;
    if (success) {
      delta = rand(Math.max(minD, -1), Math.max(maxD, 2));
      if (delta === -99) {
        // Engine blown special case
        delta = 15;
        outcomeText = '💥 Engine let go. Headed to the garage.';
        outcome = 'bad';
      } else {
        outcomeText = delta < 0 ? `⬆ Gained ${Math.abs(delta)} position${Math.abs(delta)>1?'s':''}.` : delta > 0 ? `⬇ Lost ${delta} position${delta>1?'s':''}.` : '→ Held steady.';
        outcome = delta < 0 ? 'good' : delta > 0 ? 'bad' : 'neutral';
      }
    } else {
      delta = rand(0, Math.abs(minD));
      outcomeText = delta > 0 ? `⬇ Lost ${delta} position${delta>1?'s':''}.` : '→ Held steady.';
      outcome = delta > 0 ? 'bad' : 'neutral';
    }
  }

  cr.deltas.push(delta);
  cr.resolved.push({
    icon: beat.icon,
    title: beat.title,
    desc: `You chose: ${choice.text}`,
    outcomeText,
    outcome,
  });
  cr.beatIndex++;
  saveGame();
  renderTab();
}

      h('div',{className:'result-pos pop-in',style:{color:col}}, dnf?'DNF':`P${pos}`),
      h('div',{style:{fontSize:'16px',color:'#94A3B8',marginTop:'4px'}},`of ${fieldSize} cars`),
    ),
    h('div',{className:'grid-2',style:{margin:'20px 0'}},
      h('div',{style:{textAlign:'center'}},
        h('div',{style:{fontSize:'24px',fontWeight:900,color:prize>0?'#10B981':'#EF4444'}},fmtMoney(prize)),
        h('div',{style:{fontSize:'12px',color:'#64748B'}},'PRIZE MONEY'),
      ),
      h('div',{style:{textAlign:'center'}},
        h('div',{style:{fontSize:'24px',fontWeight:900,color:tierInfo.color}},`+${calcPoints(pos,dnf)}`),
        h('div',{style:{fontSize:'12px',color:'#64748B'}},'POINTS'),
      ),
    ),
    // Rival reaction
    (() => {
      const rival = G.rivals[rand(0, G.rivals.length-1)];
      if (!rival) return null;
      const msg = pos <= 3 && !dnf
        ? pick(rival.trash)
        : pick(rival.praise||rival.trash);
      return h('div',{style:{background:'#060A10',borderRadius:'8px',padding:'12px',marginBottom:'16px',borderLeft:`3px solid ${rival.color}`}},
        h('div',{style:{fontSize:'13px',color:rival.color,fontWeight:700,marginBottom:'4px'}},`${rival.icon} ${rival.name}`),
        h('div',{style:{fontSize:'14px',color:'#E2E8F0',fontStyle:'italic'}},`"${msg}"`),
      );
    })(),
    h('div',{className:'modal-actions'},
      mkBtn('Standings','btn-ghost',()=>{ closeModalDirect(); showTab('standings'); }),
      mkBtn('Continue →','btn-primary btn-lg',()=>{ closeModalDirect(); showTab(getCurrentRace()?'race':'dashboard'); }),
    ),
  ));
}

// ─── GARAGE ─────────────────────────────────────────────────────
function renderStandings() {
  const f = document.createDocumentFragment();
  const tier = getTier();
  f.appendChild(h('div',{className:'page-title'},'Standings'));
  f.appendChild(h('div',{className:'page-sub'},
    G.schedule
      ? `${tier.name} · Season ${G.season} · ${G.schedule.filter(r=>r.result).length} of ${tier.races} races run`
      : `${tier.name} · Season ${G.season} · No season active`
  ));

  if (!G.schedule || !G.aiField) {
    f.appendChild(h('div',{className:'card',style:{textAlign:'center',padding:'32px',color:'#64748B'}},
      'Start a season to see standings.'
    ));
    return f;
  }

  // Build combined standings
  const playerRow = {
    name: `${G.name} ★`,
    points: G.points,
    wins: G.seasonResults.filter(r=>r.pos===1&&!r.dnf).length,
    top5s: G.seasonResults.filter(r=>r.pos<=5&&!r.dnf).length,
    starts: G.seasonResults.length,
    isPlayer: true,
  };
  const allRows = [playerRow, ...G.aiField.map(ai=>({...ai, isPlayer:false}))]
    .sort((a,b) => b.points - a.points || b.wins - a.wins);

  const playerPos = allRows.findIndex(r=>r.isPlayer) + 1;
  const leaderPts = allRows[0]?.points || 0;
  const gap = leaderPts - G.points;

  // Championship summary bar
  f.appendChild(h('div',{className:'card'},
    h('div',{style:{display:'flex',gap:'20px',flexWrap:'wrap',fontSize:'14px'}},
      h('div',null,
        h('div',{style:{color:'#64748B',fontSize:'12px'}},'YOUR POSITION'),
        h('div',{style:{color: playerPos<=3?'#F59E0B':'#F9FAFB',fontWeight:900,fontSize:'24px'}},`P${playerPos}`),
      ),
      h('div',null,
        h('div',{style:{color:'#64748B',fontSize:'12px'}},'POINTS'),
        h('div',{style:{color:'#F9FAFB',fontWeight:900,fontSize:'24px'}},String(G.points)),
      ),
      gap > 0 ? h('div',null,
        h('div',{style:{color:'#64748B',fontSize:'12px'}},'POINTS BACK'),
        h('div',{style:{color:'#EF4444',fontWeight:900,fontSize:'24px'}},String(gap)),
      ) : h('div',null,
        h('div',{style:{color:'#64748B',fontSize:'12px'}},'LEAD'),
        h('div',{style:{color:'#10B981',fontWeight:900,fontSize:'24px'}},'Leader'),
      ),
      h('div',null,
        h('div',{style:{color:'#64748B',fontSize:'12px'}},'RACES LEFT'),
        h('div',{style:{color:'#94A3B8',fontWeight:900,fontSize:'24px'}},String(G.schedule.filter(r=>!r.result).length)),
      ),
    ),
  ));

  // Standings table
  const tableCard = h('div',{className:'card'});
  const tbl = h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'14px'}});
  // Header
  tbl.appendChild(h('tr',{style:{borderBottom:'1px solid #1E2433',color:'#64748B',fontSize:'12px',textTransform:'uppercase',letterSpacing:'0.08em'}},
    h('th',{style:{padding:'6px 8px',textAlign:'left',width:'32px'}},'#'),
    h('th',{style:{padding:'6px 8px',textAlign:'left'}},'Driver'),
    h('th',{style:{padding:'6px 8px',textAlign:'right'}},'Pts'),
    h('th',{style:{padding:'6px 8px',textAlign:'right'}},'W'),
    h('th',{style:{padding:'6px 8px',textAlign:'right'}},'T5'),
    h('th',{style:{padding:'6px 8px',textAlign:'right'}},'St'),
  ));
  allRows.forEach((row, idx) => {
    const posNum = idx + 1;
    const posColor = posNum===1?'#F59E0B':posNum<=3?'#10B981':posNum<=10?'#94A3B8':'#4B5563';
    
    // Get relationship with player for non-player rows
    let relationshipIcon = '';
    if (!row.isPlayer && G.relationships) {
      const rel = getRelationshipDisplay(G.name, row.name);
      relationshipIcon = ` ${rel.icon}`;
    }
    
    const tr = h('tr',{style:{
      borderBottom:'1px solid #0D1117',
      background: row.isPlayer ? '#0D1117' : 'transparent',
    }},
      h('td',{style:{padding:'8px',fontWeight:800,color:posColor,fontSize:'15px'}},String(posNum)),
      h('td',{style:{padding:'8px',fontWeight:row.isPlayer?900:400,color:row.isPlayer?'#F59E0B':'#E2E8F0'}},row.name + relationshipIcon),
      h('td',{style:{padding:'8px',textAlign:'right',fontWeight:700,color:'#F9FAFB'}},String(row.points)),
      h('td',{style:{padding:'8px',textAlign:'right',color:'#F59E0B'}},String(row.wins||0)),
      h('td',{style:{padding:'8px',textAlign:'right',color:'#10B981'}},String(row.top5s||0)),
      h('td',{style:{padding:'8px',textAlign:'right',color:'#64748B'}},String(row.starts||0)),
    );
    tbl.appendChild(tr);
  });
  tableCard.appendChild(tbl);
  f.appendChild(tableCard);

  return f;
}

function renderDriver() {
  const f = document.createDocumentFragment();
  f.appendChild(h('div',{className:'page-title'},'Driver'));
  f.appendChild(h('div',{className:'page-sub'},`${G.name} · Rep: ${G.rep} · Season ${G.season}`));

  // Training actions — gym and sim
  const trainCard = h('div',{className:'card'});
  trainCard.appendChild(h('div',{className:'card-title'},'Training'));
  trainCard.appendChild(h('div',{style:{fontSize:'14px',color:'#94A3B8',marginBottom:'14px'}},
    'One training session per week. Gym improves physical stamina (Consistency). Sim improves mental sharpness (Racecraft or Speed).'
  ));
  const lastTrain = G.lastTraining || 0;
  const canTrain = G.race > lastTrain; // can train once per race; resets when race counter advances
  const trainGrid = h('div',{className:'grid-2',style:{marginBottom:'0'}});
  [
    { id:'gym',      label:'🏋️ Hit the Gym',        stat:'consistency', gain:1, cost:0,   desc:'Physical conditioning. Improves stamina and late-race performance (+1 Consistency XP).' },
    { id:'sim',      label:'🖥️ Sim Session',         stat:'racecraft',   gain:1, cost:200, desc:'Mental reps in the simulator. Sharpens racecraft and reaction (+1 Racecraft XP). Costs $200.' },
    { id:'spd_sim',  label:'🏁 Speed Focused Sim',   stat:'speed',       gain:1, cost:300, desc:'Focus on raw lap time in the sim. Builds pace and qualifying speed (+1 Speed XP). Costs $300.' },
    { id:'film',     label:'📺 Watch Film',           stat:'racecraft',   gain:1, cost:0,   desc:'Study competitor footage. Free, but smaller gains than active sim time (+1 Racecraft XP).' },
  ].forEach(act => {
    const canAfford = act.cost === 0 || G.money >= act.cost;
    const xpKey = `${act.stat}_xp`;
    if (!G.xp) G.xp = {};
    const currentXP = G.xp[xpKey] || 0;
    const xpNeeded = (G.stats[act.stat] + 1) * 5; // XP needed scales with level
    const canLevel = currentXP >= xpNeeded && G.stats[act.stat] < 10;
    const div = h('div',{style:{background:'#060A10',borderRadius:'8px',padding:'12px',border:'1px solid #1E2433'}});
    div.appendChild(h('div',{style:{fontSize:'14px',fontWeight:800,color:'#F9FAFB',marginBottom:'4px'}},act.label));
    div.appendChild(h('div',{style:{fontSize:'13px',color:'#64748B',marginBottom:'8px'}},act.desc));
    if (act.cost > 0) div.appendChild(h('div',{style:{fontSize:'12px',color:'#94A3B8',marginBottom:'6px'}},`Cost: ${fmtMoney(act.cost)}`));
    div.appendChild(h('div',{style:{fontSize:'12px',color:'#94A3B8',marginBottom:'8px'}},`XP: ${currentXP}/${xpNeeded} → Level ${G.stats[act.stat]}`));
    div.appendChild(mkBtn(
      !canTrain ? 'Already trained this week' : !canAfford ? `Need ${fmtMoney(act.cost)}` : 'Train',
      'btn-sm btn-secondary',
      () => {
        G.money -= act.cost;
        if (!G.xp) G.xp = {};
        G.xp[xpKey] = (G.xp[xpKey]||0) + act.gain;
        G.lastTraining = G.race;
        saveGame(); renderTab();
        showToast(`${act.label} complete! +${act.gain} ${act.stat} XP`);
      },
      !canTrain || !canAfford,
    ));
    trainGrid.appendChild(div);
  });
  trainCard.appendChild(trainGrid);

  // Level up buttons when XP threshold is met
  const levelCard = h('div',{className:'card',style:{marginTop:'0'}});
  levelCard.appendChild(h('div',{className:'card-title'},'Level Up'));
  let hasLevelUp = false;
  ['speed','racecraft','consistency'].forEach(stat => {
    if (!G.xp) G.xp = {};
    const xpKey = `${stat}_xp`;
    const currentXP = G.xp[xpKey]||0;
    const xpNeeded = (G.stats[stat]+1)*5;
    const canLevel = currentXP >= xpNeeded && G.stats[stat] < 10;
    if (canLevel) {
      hasLevelUp = true;
      levelCard.appendChild(h('div',{style:{display:'flex',gap:'12px',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #0D1117'}},
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:'14px',fontWeight:700,color:'#F9FAFB'}},stat.charAt(0).toUpperCase()+stat.slice(1)),
          h('div',{style:{fontSize:'13px',color:'#94A3B8'}},`${currentXP}/${xpNeeded} XP · Currently ${G.stats[stat]}/10`),
        ),
        mkBtn(`Level Up → ${G.stats[stat]+1}`,'btn-sm btn-primary',()=>{
          G.stats[stat]++;
          G.xp[xpKey] = 0; // reset XP for next level
          saveGame(); renderTab();
          showToast(`${stat.charAt(0).toUpperCase()+stat.slice(1)} leveled up to ${G.stats[stat]}!`);
        }),
      ));
    }
  });
  if (!hasLevelUp) levelCard.appendChild(h('div',{style:{fontSize:'14px',color:'#64748B',padding:'8px 0'}},'Keep training to earn enough XP to level up.'));

  f.appendChild(trainCard);
  f.appendChild(levelCard);

  // Stat display
  f.appendChild(h('div',{className:'card'},
    h('div',{className:'card-title'},'Current Stats'),
    statBar('Speed',      getEffectiveStat('speed'),      15,'#EF4444'),
    statBar('Racecraft',  getEffectiveStat('racecraft'),  15,'#3B82F6'),
    statBar('Consistency',getEffectiveStat('consistency'),15,'#10B981'),
    h('div',{style:{fontSize:'12px',color:'#64748B',marginTop:'6px'}},
      `Base: Speed ${G.stats.speed} · Racecraft ${G.stats.racecraft} · Consistency ${G.stats.consistency} (car bonus included in bars above)`
    ),
  ));

  // Rep-based upgrades (legacy path still available)
  const repCard = h('div',{className:'card'});
  repCard.appendChild(h('div',{className:'card-title'},'Rep Upgrades'));
  repCard.appendChild(h('div',{style:{fontSize:'14px',color:'#94A3B8',marginBottom:'14px'}},'Spend reputation points for immediate stat gains — no XP grind required.'));
  [
    { stat:'speed',       label:'Speed',       color:'#EF4444', cost:8 },
    { stat:'racecraft',   label:'Racecraft',   color:'#3B82F6', cost:8 },
    { stat:'consistency', label:'Consistency', color:'#10B981', cost:8 },
  ].forEach(s => {
    const canUp = G.stats[s.stat] < 10 && G.rep >= s.cost;
    repCard.appendChild(h('div',{style:{display:'flex',gap:'10px',alignItems:'center',marginBottom:'10px'}},
      h('div',{style:{flex:1,fontSize:'14px',color:'#94A3B8'}},s.label,
        h('span',{style:{color:s.color,fontWeight:700,marginLeft:'8px'}},`${G.stats[s.stat]}/10`),
      ),
      mkBtn(`${s.cost} rep`,'btn-sm btn-secondary',()=>{
        G.stats[s.stat]++; G.rep-=s.cost; saveGame(); renderTab();
        showToast(`${s.label} improved!`);
      },!canUp),
    ));
  });
  f.appendChild(repCard);

  return f;
}

              h('div',{style:{fontSize:'13px',color:'#94A3B8'}},`Level ${currentLevel}/${upg.tiers.length}`),
    ));
    div.appendChild(h('div',{style:{fontSize:'13px',color:'#64748B',marginBottom:'8px'}},upg.desc));
    div.appendChild(pipRow(upg.label, upg.icon, currentLevel, upg.tiers.length));
    if (!maxed) {
      div.appendChild(h('div',{style:{marginTop:'10px',display:'flex',gap:'10px',alignItems:'center'}},
        h('div',{style:{fontSize:'14px',color:canBuy?'#10B981':'#EF4444',fontWeight:700}},fmtMoney(nextTier.cost)),
        mkBtn(canBuy?'Upgrade':'Need Funds','btn-sm btn-primary',
          ()=>{ G.money-=nextTier.cost; G.car[upg.id]++; saveGame(); renderTab(); showToast(`${upg.label} upgraded to level ${G.car[upg.id]}!`); },
          !canBuy),
      ));
    }
    f.appendChild(div);
  });

  return f;
}

// ─── RIVALS ─────────────────────────────────────────────────────
function renderRivals() {
  const f = document.createDocumentFragment();
  f.appendChild(h('div',{className:'page-title'},'Rivals'));
  f.appendChild(h('div',{className:'page-sub'},'The drivers who want to see you fail.'));

  G.rivals.forEach(r => {
    const heatColor = r.heat >= 7 ? '#EF4444' : r.heat >= 4 ? '#F59E0B' : '#94A3B8';
    const heatLabel = r.heat >= 7 ? '🔥 Heated Rivalry' : r.heat >= 4 ? '⚡ Building Tension' : '👀 Watching You';
    const card = h('div',{className:'card'});
    card.appendChild(h('div',{style:{display:'flex',gap:'14px',alignItems:'flex-start',marginBottom:'14px'}},
      h('div',{className:'rival-avatar',style:{width:'56px',height:'56px',background:r.color+'22',color:r.color,fontSize:'26px',border:`2px solid ${r.color}44`,borderRadius:'10px',display:'flex',alignItems:'center',justifyContent:'center'}},r.icon),
      h('div',{style:{flex:1}},
        h('div',{style:{fontSize:'18px',fontWeight:900,color:'#F9FAFB'}},r.name),
        h('div',{style:{fontSize:'13px',color:r.color,fontWeight:700}},r.id.replace('_',' ').toUpperCase()),
        h('div',{style:{fontSize:'14px',color:'#94A3B8',marginTop:'3px'}},r.desc),
      ),
    ));
    card.appendChild(h('div',{style:{display:'flex',gap:'20px',marginBottom:'12px',fontSize:'13px'}},
      h('div',null,h('div',{style:{color:'#64748B'}},'RIVALRY'),h('div',{style:{color:heatColor,fontWeight:700}},heatLabel)),
      h('div',null,h('div',{style:{color:'#64748B'}},'TIMES BEATEN'),h('div',{style:{color:'#10B981',fontWeight:700}},String(r.defeated||0))),
      h('div',null,h('div',{style:{color:'#64748B'}},'ENCOUNTERS'),h('div',{style:{color:'#F9FAFB',fontWeight:700}},String(r.interactions||0))),
    ));
    // Latest trash talk
    const quote = pick(r.trash);
    card.appendChild(h('div',{style:{background:'#060A10',borderRadius:'8px',padding:'10px 12px',borderLeft:`3px solid ${r.color}`,fontSize:'14px',color:'#E2E8F0',fontStyle:'italic'}},
      `"${quote}"`
    ));
    f.appendChild(card);
  });

  return f;
}

// ─── CAREER ─────────────────────────────────────────────────────
function renderCareer() {
  const f = document.createDocumentFragment();
  f.appendChild(h('div',{className:'page-title'},'Career'));
  f.appendChild(h('div',{className:'page-sub'},`${G.name} · ${getTier().name}`));
  // Restart button
  f.appendChild(h('div',{style:{textAlign:'right',marginBottom:'16px'}},
    mkBtn('🔄 Restart Career','btn-danger btn-sm',restartCareer),
  ));

  // Tier progress
  const tierCard = h('div',{className:'card'});
  tierCard.appendChild(h('div',{className:'card-title'},'Career Path'));
  TIERS.forEach(t => {
    const done   = G.tier > t.id;
    const active = G.tier === t.id;
    const locked = G.tier < t.id;
    tierCard.appendChild(h('div',{style:{
      display:'flex',gap:'12px',alignItems:'center',padding:'10px 0',
      borderBottom:'1px solid #0D1117',opacity:locked?'0.4':'1',
    }},
      h('div',{style:{
        width:'32px',height:'32px',borderRadius:'50%',flexShrink:0,
        background:done?'#065F46':active?t.color+'33':'#1E2433',
        border:`2px solid ${done?'#10B981':active?t.color:'#374151'}`,
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:'14px',fontWeight:900,color:done?'#10B981':active?t.color:'#64748B',
      }},done?'✓':String(t.id)),
      h('div',{style:{flex:1}},
        h('div',{style:{fontSize:'15px',fontWeight:800,color:active?'#F9FAFB':'#94A3B8'}},t.name),
        h('div',{style:{fontSize:'13px',color:'#64748B'}},
          `${t.fieldSize} cars · ${t.races} races · Win: ${fmtMoney(t.winPrize)}`,
          locked?` · Requires ${t.reqWins} wins + ${t.reqRep} rep`:'',
        ),
      ),
      active?h('div',{style:{fontSize:'12px',color:t.color,fontWeight:700}},'CURRENT'):null,
    ));
  });
  f.appendChild(tierCard);

  // Season history
  if (G.seasonHistory.length) {
    const shCard = h('div',{className:'card'});
    shCard.appendChild(h('div',{className:'card-title'},'Season History'));
    [...G.seasonHistory].reverse().forEach(s => {
      const posColor = s.finalPos===1?'#F59E0B':s.finalPos<=3?'#10B981':s.finalPos<=10?'#94A3B8':'#64748B';
      // Season summary row
      const row = h('div',{style:{padding:'10px 0',borderBottom:'1px solid #0D1117'}});
      row.appendChild(h('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap',marginBottom:'6px'}},
        h('div',{style:{fontSize:'15px',fontWeight:800,color:'#F9FAFB'}},`Season ${s.season}`),
        h('div',{style:{fontSize:'13px',color:'#94A3B8',flex:1}},TIERS[s.tier-1]?.name||''),
        h('div',{style:{display:'flex',gap:'12px',fontSize:'13px'}},
          s.finalPos ? h('span',{style:{color:posColor,fontWeight:900,fontSize:'16px'}},`P${s.finalPos}`) : null,
          h('span',{style:{color:'#F59E0B',fontWeight:700}},`${s.wins}W`),
          h('span',{style:{color:'#10B981'}},`${s.points}pts`),
          h('span',{style:{color:'#64748B'}},`${s.races} races`),
        ),
      ));
      // Mini standings if available
      if (s.standings && s.standings.length) {
        const mini = h('div',{style:{background:'#060A10',borderRadius:'6px',padding:'8px 10px',fontSize:'12px'}});
        s.standings.slice(0,5).forEach((dr,idx)=>{
          mini.appendChild(h('div',{style:{
            display:'flex',gap:'8px',padding:'2px 0',
            color:dr.isPlayer?'#F59E0B':'#94A3B8',
            fontWeight:dr.isPlayer?700:400,
          }},
            h('span',{style:{minWidth:'20px',color:idx===0?'#F59E0B':idx<=2?'#10B981':'#64748B'}},`P${idx+1}`),
            h('span',{style:{flex:1}},dr.name),
            h('span',null,String(dr.points)+'pts'),
          ));
        });
        row.appendChild(mini);
      }
      shCard.appendChild(row);
    });
    f.appendChild(shCard);
  }

  // Career log
  const logCard = h('div',{className:'card'});
  logCard.appendChild(h('div',{className:'card-title'},'Race Log'));
  const logInner = h('div',{style:{maxHeight:'300px',overflowY:'auto'}});
  G.log.forEach((entry,i) => {
    logInner.appendChild(h('div',{style:{padding:'5px 0',borderBottom:'1px solid #0B0F1A',fontSize:'13px',color:i===0?'#F9FAFB':'#64748B'}},entry));
  });
  logCard.appendChild(logInner);
  f.appendChild(logCard);

  return f;
}

// ─── INIT ────────────────────────────────────────────────────────
function startCareer() {
  const name  = document.getElementById('setup-name').value.trim();
  const num   = document.getElementById('setup-num').value.trim() || '47';
  const state = document.getElementById('setup-state').value;
  if (!name) { openModal(h('div',null,
    h('div',{className:'modal-title'},'Enter Your Name'),
    h('div',{className:'modal-sub'},'You need a driver name to start your career.'),
    h('div',{className:'modal-actions'},mkBtn('OK','btn-primary',closeModalDirect)),
  )); return; }
  initGame(name, num, state);
  // Generate first contract offers
  G.contractOffers = generateContractOffers();
  saveGame();
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('app').style.display = 'flex';
  showTab('dashboard');
}

function restartCareer() {
  openModal(h('div',null,
    h('div',{className:'modal-title',style:{color:'#EF4444'}},'Start Over?'),
    h('div',{className:'modal-sub'},'This will erase all progress. Your career will be gone forever.'),
    h('div',{className:'modal-actions'},
      mkBtn('Cancel','btn-ghost',closeModalDirect),
      mkBtn('Yes — Start Fresh','btn-danger',()=>{
        localStorage.removeItem('ft_rpg_save');
        closeModalDirect();
        document.getElementById('setup').classList.remove('hidden');
        document.getElementById('app').style.display = 'none';
        document.getElementById('setup-name').value = '';
        document.getElementById('setup-num').value = '';
      }),
    ),
  ));
}

window.addEventListener('DOMContentLoaded', async () => {
  const loaded = await loadGame();
  if (loaded && G) {
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('app').style.display = 'flex';
    showTab('dashboard');
  }
});
</script>
</body>
</html>
