<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Sim RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <div id="setup" class="card">
            <h2 style="margin-bottom: 20px;">Driver Registration</h2>
            
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="driverName" placeholder="e.g. Dale Earnhardt">
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <div style="flex: 1;">
                    <label>Car #</label>
                    <input type="number" id="driverNum" placeholder="3">
                </div>
                <div style="flex: 2;">
                    <label>Home State</label>
                    <input type="text" id="driverState" placeholder="North Carolina">
                </div>
            </div>

            <button class="btn-primary" style="margin-top: 25px;" onclick="startGame()">
                Begin Career
            </button>
        </div>

        <div id="app" class="hidden" style="flex-direction: column; height: 100%;">
            <nav id="navbar">
                <button onclick="showTab('dashboard')">Dashboard</button>
                <button onclick="showTab('race')">Next Race</button>
                <button onclick="showTab('garage')">Garage</button>
            </nav>

            <div id="main-content"></div>
        </div>
    </div>

    <div id="modal-overlay" class="hidden">
        <div id="modal-content" class="card">
            </div>
    </div>

    <script src="game.js"></script>
    
    <script src="src/renderer.js"></script>

    <script>
        // When the page finishes loading, check for a save file
        window.onload = async () => {
            try {
                const hasSave = await loadGame();
                if (hasSave && G) {
                    // If a save exists, skip registration and go to Dashboard
                    document.getElementById('setup').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('app').style.display = 'flex';
                    showTab('dashboard');
                }
            } catch (e) {
                console.error("Initialization failed. Check if data.json exists.", e);
            }
        };
    </script>
</body>
</html>
