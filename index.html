<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Throttle v1.5.2-SIM — Simulated Career RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;background:#04060E;color:#E2E8F0;font-size:16px;line-height:1.45}
input,textarea,select,button{font-family:inherit;font-size:15px}
input,textarea,select{background:#131822;border:1px solid #64748B;border-radius:6px;color:#F9FAFB;padding:8px 11px}
input:focus,textarea:focus,select:focus{outline:2px solid #D97706;outline-offset:1px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0B0F1A}
::-webkit-scrollbar-thumb{background:#64748B;border-radius:3px}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#setup-screen{position:fixed;inset:0;background:#04060E;display:flex;align-items:center;justify-content:center;z-index:999}
#setup-screen.hidden{display:none}
#header{background:#080C14;border-bottom:2px solid #1E2433;padding:10px 24px;display:flex;align-items:center;gap:20px;flex-shrink:0}
.driver-name{font-size:22px;font-weight:900;color:#F59E0B;line-height:1}
.driver-sub{font-size:12px;color:#94A3B8;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:2px}
.hdr-stats{display:flex;gap:24px;margin-left:auto}
.hdr-stat .val{font-size:17px;font-weight:800;color:#F9FAFB;line-height:1}
.hdr-stat .lbl{font-size:12px;color:#94A3B8;text-transform:uppercase;letter-spacing:0.1em;margin-top:2px}
#tabs{background:#080C14;border-bottom:2px solid #1E2433;display:flex;gap:2px;padding:6px 24px 0;flex-shrink:0;overflow-x:auto}
.tab{background:transparent;border:none;border-bottom:3px solid transparent;color:#94A3B8;padding:7px 16px;font-size:13px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:color 0.15s}
.tab:hover{color:#E2E8F0}
.tab.active{color:#F59E0B;border-bottom-color:#F59E0B}
.tab-badge{display:inline-block;background:#D97706;color:#000;font-size:10px;font-weight:900;padding:1px 5px;border-radius:10px;margin-left:5px;vertical-align:middle}
#content{flex:1;overflow-y:auto;padding:24px}
.page{max-width:980px;margin:0 auto;animation:fadeIn 0.2s ease}
.page-title{font-size:26px;font-weight:900;margin-bottom:6px;color:#F9FAFB}
.page-sub{font-size:15px;color:#94A3B8;margin-bottom:20px}
.card{background:#0B0F1A;border:1px solid #1E2433;border-radius:10px;padding:18px;margin-bottom:14px}
.card-title{font-size:14px;color:#94A3B8;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:12px;font-weight:700}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat-bar{margin-bottom:10px}
.stat-bar .sb-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px}
.stat-bar .sb-lbl{color:#94A3B8;text-transform:uppercase;letter-spacing:0.08em}
.stat-bar .sb-val{color:#E5E7EB;font-weight:700}
.stat-bar .sb-track{height:5px;background:#1E2433;border-radius:3px;overflow:hidden}
.stat-bar .sb-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.badge{display:inline-block;padding:3px 9px;border-radius:4px;font-size:12px;font-weight:700;letter-spacing:0.04em;border:1px solid;white-space:nowrap}
button{cursor:pointer;border:none;border-radius:6px;font-weight:700;letter-spacing:0.03em;transition:opacity 0.15s,filter 0.15s;white-space:nowrap}
button:not(:disabled):hover{filter:brightness(1.12)}
button:disabled{opacity:0.35;cursor:not-allowed;pointer-events:none}
.btn{padding:8px 18px;font-size:14px}
.btn-lg{padding:11px 24px;font-size:16px}
.btn-full{width:100%}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-xs{padding:3px 8px;font-size:12px}
.btn-primary{background:#D97706;color:#000}
.btn-success{background:#065F46;color:#6EE7B7}
.btn-danger{background:#7F1D1D;color:#FCA5A5}
.btn-ghost{background:transparent;color:#CBD5E1;border:1px solid #64748B}
.btn-secondary{background:#1E2433;color:#E5E7EB}
.row-item{display:flex;align-items:center;gap:14px;background:#060A10;border:1px solid #1E2433;border-radius:8px;padding:11px 14px;margin-bottom:8px}
.row-item .accent{width:4px;align-self:stretch;border-radius:2px;flex-shrink:0}
.row-name{font-size:15px;font-weight:800;color:#F9FAFB}
.row-sub{font-size:14px;color:#94A3B8;margin-top:2px}
.drama-banner{background:#1a1200;border:1px solid #D97706;border-radius:8px;padding:14px 16px;margin-bottom:10px}
.drama-title{font-size:15px;font-weight:800;color:#FBBF24;margin-bottom:5px}
.drama-desc{font-size:15px;color:#E2E8F0;line-height:1.5;margin-bottom:10px}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px}
#modal-overlay.hidden{display:none}
#modal-box{background:#0B0F1A;border:1px solid #64748B;border-radius:14px;padding:26px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto}
.modal-title{font-size:22px;font-weight:900;color:#F9FAFB;margin-bottom:3px}
.modal-sub{font-size:15px;color:#94A3B8;margin-bottom:22px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.setup-box{text-align:center;max-width:480px;width:100%;padding:24px;animation:slideUp 0.5s ease}
.setup-logo{font-size:78px;font-weight:900;line-height:0.88;background:linear-gradient(135deg,#F59E0B,#FBBF24,#F97316);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite;margin-bottom:10px}
.setup-card{background:#0B0F1A;border:1px solid #1E2433;border-radius:12px;padding:30px;margin-bottom:16px}
.setup-card input,.setup-card select{width:100%;font-size:16px;font-weight:600;text-align:center;margin-bottom:14px;border-width:2px}
.setup-hint{font-size:14px;color:#64748B;margin-bottom:20px;line-height:1.5}
.sim-scene{background:#060A10;border:1px solid #2D3748;border-radius:10px;padding:18px;margin-bottom:12px}
.sim-narrative{font-size:15px;color:#CBD5E1;line-height:1.7;margin-bottom:14px;font-style:italic;border-left:3px solid #8B5CF622;padding-left:12px}
.sim-choices{display:flex;flex-direction:column;gap:7px}
.sim-choice-btn{background:#0B0F1A;border:1px solid #2D3748;border-radius:8px;padding:12px 16px;text-align:left;cursor:pointer;transition:border-color 0.15s,background 0.15s;font-size:14px;color:#E2E8F0;font-family:'Barlow Condensed',Arial,sans-serif;font-weight:600;width:100%}
.sim-choice-btn:hover:not(:disabled){border-color:#F59E0B;background:#1a1200;color:#F9FAFB}
.sim-outcome{border-radius:8px;padding:14px 16px;margin-top:12px;border-left:3px solid #64748B;background:#060A10}
.sim-outcome.good{border-left-color:#10B981;background:#06130e}
.sim-outcome.bad{border-left-color:#EF4444;background:#130606}
.driver-card{display:flex;gap:12px;align-items:flex-start;background:#060A10;border:1px solid #1E2433;border-radius:8px;padding:12px;margin-bottom:8px}
#toast-container{position:fixed;bottom:24px;right:24px;z-index:1000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#0B0F1A;border:1px solid #2D3748;border-radius:8px;padding:12px 16px;font-size:14px;font-weight:600;color:#F9FAFB;animation:slideUp 0.3s ease;max-width:320px}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div id="setup-screen">
<div class="setup-box">
<div style="font-size:11px;letter-spacing:0.35em;color:#94A3B8;text-transform:uppercase;margin-bottom:12px">Full Throttle — Simulated Branch</div>
<div class="setup-logo">FULL<br>THROTTLE</div>
<div class="setup-card">
<form id="setup-form">
<div style="font-size:12px;color:#CBD5E1;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.1em">Your Driver Name</div>
<input id="driver-name-input" type="text" placeholder="Enter your name..." maxlength="28" required autocomplete="off">
<div style="font-size:12px;color:#CBD5E1;margin-bottom:6px;margin-top:14px;text-transform:uppercase;letter-spacing:0.1em">Home State/Region</div>
<select id="driver-state-input" style="width:100%;margin-bottom:16px;font-size:16px;font-weight:600;text-align:center"></select>
<div style="font-size:12px;color:#CBD5E1;margin-bottom:6px;margin-top:14px;text-transform:uppercase;letter-spacing:0.1em">Car Number</div>
<input id="driver-number-input" type="number" min="0" max="99" placeholder="0-99" style="width:100%;margin-bottom:16px;font-size:16px;font-weight:600;text-align:center">
<div class="setup-hint">No iRacing required. Qualify and race by picking narrative choices. Build your driver RPG-style, upgrade your car between races.</div>
<button type="submit" class="btn btn-lg btn-primary btn-full">START CAREER &#8594;</button>
</form>
</div>
</div>
</div>
<div id="app" style="display:none">
<div id="header"></div>
<div id="tabs"></div>
<div id="content"></div>
</div>
<div id="modal-overlay" class="hidden"><div id="modal-box"></div></div>
<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// UTILITY FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function randF(min, max) {
  return Math.random() * (max - min) + min;
}

function clamp(val, min, max) {
  return Math.max(min, Math.min(max, val));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function fmtMoney(n) {
  return '$' + n.toLocaleString();
}

function fmtFans(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toString();
}

function ordinal(n) {
  const s = ['th', 'st', 'nd', 'rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

// ═══════════════════════════════════════════════════════════════════════
// GAME CONSTANTS
// ═══════════════════════════════════════════════════════════════════════

const APP_VERSION = 'v1.6.0-SIM';
const DRIVER_ATTR_DEFAULT = 3;
const DRIVER_ATTR_POINTS_START = 15;

const SERIES_FIELD_SIZE = {
  mini_stock: 18,
  street_stock: 20,
  late_model_stock: 22,
  super_late_model: 24,
  arca_menards: 26,
  nascar_trucks: 32,
  nascar_xfinity: 36,
  nascar_cup: 40,
};

const CONDITIONS = [
  {id: 'clear', label: 'Clear', icon: '☀️', color: '#F59E0B', tireWear: 1.0},
  {id: 'light_rain', label: 'Light Rain', icon: '🌧️', color: '#3B82F6', tireWear: 0.7},
  {id: 'heavy_rain', label: 'Heavy Rain', icon: '⛈️', color: '#1E3A8A', tireWear: 0.5},
  {id: 'hot_slick', label: 'Hot & Slick', icon: '🔥', color: '#EF4444', tireWear: 1.4},
  {id: 'night', label: 'Night', icon: '🌙', color: '#8B5CF6', tireWear: 1.0},
];

function rollCondition() {
  const r = Math.random();
  if (r < 0.60) return 'clear';
  if (r < 0.75) return 'hot_slick';
  if (r < 0.85) return 'night';
  if (r < 0.95) return 'light_rain';
  return 'heavy_rain';
}

const IRACING_PTS = Array.from({length:50},(_,i)=>Math.max(1,43-i));

// ── U.S. States (all 50 + DC) ────────────────────────────────────────
const US_STATES = [
  'AL','AR','AZ','CA','CO','CT','DE','FL','GA','IA','ID','IL','IN','KS','KY',
  'LA','MA','MD','ME','MI','MN','MO','MS','MT','NC','ND','NE','NH','NJ','NM',
  'NV','NY','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VA','VT','WA',
  'WI','WV','WY','DC',
];

const US_STATE_NAMES = {
  AL:'Alabama',AR:'Arkansas',AZ:'Arizona',CA:'California',CO:'Colorado',
  CT:'Connecticut',DE:'Delaware',FL:'Florida',GA:'Georgia',IA:'Iowa',
  ID:'Idaho',IL:'Illinois',IN:'Indiana',KS:'Kansas',KY:'Kentucky',
  LA:'Louisiana',MA:'Massachusetts',MD:'Maryland',ME:'Maine',MI:'Michigan',
  MN:'Minnesota',MO:'Missouri',MS:'Mississippi',MT:'Montana',NC:'North Carolina',
  ND:'North Dakota',NE:'Nebraska',NH:'New Hampshire',NJ:'New Jersey',NM:'New Mexico',
  NV:'Nevada',NY:'New York',OH:'Ohio',OK:'Oklahoma',OR:'Oregon',PA:'Pennsylvania',
  RI:'Rhode Island',SC:'South Carolina',SD:'South Dakota',TN:'Tennessee',TX:'Texas',
  UT:'Utah',VA:'Virginia',VT:'Vermont',WA:'Washington',WI:'Wisconsin',
  WV:'West Virginia',WY:'Wyoming',DC:'Washington D.C.',

// ── International Regions (replace old "International" catch-all) ────
const INTL_REGIONS = ['Europe','Africa','Asia','South America','Central America','Australia'];

const INTL_REGION_NAMES = {
  Europe:'Europe',
  Africa:'Africa',
  Asia:'Asia',
  'South America':'South America',
  'Central America':'Central America',
  Australia:'Australia',
};

const ALL_ORIGINS = [...US_STATES, ...INTL_REGIONS];
const ALL_ORIGIN_NAMES = {...US_STATE_NAMES, ...INTL_REGION_NAMES};

function isIntlRegion(origin) { 
  return INTL_REGIONS.includes(origin); 
}

function originLabel(origin) { 
  return ALL_ORIGIN_NAMES[origin] || origin; 
}

// ── Weighted AI home-state pool (Americans dominate standard series) ──
const HOME_STATE_POOL = [
  ...Array(8).fill('NC'),...Array(7).fill('VA'),...Array(7).fill('TN'),
  ...Array(6).fill('GA'),...Array(6).fill('SC'),...Array(5).fill('FL'),
  ...Array(5).fill('OH'),...Array(5).fill('IN'),...Array(4).fill('KY'),
  ...Array(4).fill('WI'),...Array(4).fill('IL'),...Array(3).fill('TX'),
  ...Array(3).fill('PA'),...Array(3).fill('MI'),...Array(3).fill('MO'),
  ...Array(2).fill('AL'),...Array(2).fill('AR'),...Array(2).fill('MS'),
  ...Array(2).fill('NY'),...Array(2).fill('CA'),...Array(2).fill('MN'),
  ...Array(1).fill('WV'),...Array(1).fill('LA'),...Array(1).fill('OK'),
  ...Array(1).fill('KS'),...Array(1).fill('NE'),...Array(1).fill('IA'),
  // Small international presence in standard series (~4%)
  ...Array(1).fill('Europe'),...Array(1).fill('Australia'),
];

// Higher intl mix for special events
const HOME_STATE_POOL_INTL = [
  ...HOME_STATE_POOL,
  ...Array(4).fill('Europe'),...Array(3).fill('Australia'),
  ...Array(2).fill('Asia'),...Array(2).fill('South America'),
  ...Array(1).fill('Africa'),...Array(1).fill('Central America'),
];

function randomHomeState(intlBias=false){
  const pool = intlBias ? HOME_STATE_POOL_INTL : HOME_STATE_POOL;
  return pool[rand(0,pool.length-1)];
}

// ── Region-appropriate first names for international drivers ──────────
const INTL_FIRST_NAMES = {
  Europe: ['Marco','Luca','Jan','Sven','Pierre','Mikael','Tom','Nico','Erik','Felix',
           'Romain','Carlos','David','Kevin','Mika','Jari','Rubens','Timo','Sebastian','Max'],
  Africa: ['Khalid','Moses','Emmanuel','Dayo','Ade','Chukwu','Sipho','Thabo','Kofi','Kwame',
           'Ahmed','Omar','Yusuf','Ibrahim','Hassan','Abebe','Tariq','Nabil','Karim','Jamal'],
  Asia: ['Hiroshi','Takashi','Wei','Jin','Sung','Park','Kenji','Ryo','Taro','Yuki',
         'Naoto','Kazuki','Daiki','Hayato','Sho','Li','Chen','Zhang','Liang','Feng'],
  'South America': ['Diego','Gabriel','Matheus','Lucas','Felipe','Gustavo','Bruno','Rafael',
                    'Andre','Rodrigo','Paulo','Emilio','Sebastian','Nicolas','Alejandro','Luis'],
  'Central America': ['Miguel','Carlos','Juan','Jose','Ernesto','Roberto','Mario','Fernando',
                      'Ricardo','Alejandro','Hector','Andres','Antonio','Manuel','Javier','Eduardo'],
  Australia: ['Jack','Liam','Noah','Connor','Dylan','Riley','Lachlan','Cody','Jayden','Blake',
              'Kyle','Brody','Corey','Tyson','Mitchell','Cameron','Nathan','Rhys','Scott','Dean'],
};

const INTL_LAST_NAMES = {
  Europe: ['Mueller','Leclerc','Verstappen','Bottas','Sainz','Norris','Alonso','Hulkenberg',
           'Magnussen','Vandoorne','Wehrlein','Auer','Eriksson','Lindqvist','Bergmann','Fischer'],
  Africa: ['Okonkwo','Mensah','Diallo','Traore','Osei','Boateng','Zuma','Dlamini','Okafor','Nwosu',
           'Hassan','Khalil','Rashid','Abdulla','Yilmaz','Petros','Tekle','Haile','Bekele','Tadesse'],
  Asia: ['Yamamoto','Tanaka','Suzuki','Kobayashi','Nakajima','Sato','Ito','Watanabe','Kimura','Matsuda',
         'Zhang','Wang','Liu','Chen','Yang','Huang','Zhou','Wu','Xu','Sun'],
  'South America': ['Silva','Santos','Oliveira','Souza','Lima','Pereira','Costa','Alves','Ferreira',
                    'Rodrigues','Barbosa','Figueiredo','Barrichello','Piquet','Massa','Senna'],
  'Central America': ['Rodriguez','Martinez','Lopez','Gonzalez','Hernandez','Perez','Torres','Flores',
                      'Rivera','Morales','Gutierrez','Ramirez','Castillo','Vargas','Cruz','Reyes'],
  Australia: ['Smith','Jones','Williams','Brown','Wilson','Taylor','Anderson','Thomas','Jackson','White',
              'Harris','Martin','Thompson','Garcia','Martinez','Robinson','Clark','Lewis','Lee','Walker'],

function generateIntlName(region) {
  const firsts = INTL_FIRST_NAMES[region] || INTL_FIRST_NAMES['Europe'];
  const lasts  = INTL_LAST_NAMES[region]  || INTL_LAST_NAMES['Europe'];
  return firsts[rand(0,firsts.length-1)] + ' ' + lasts[rand(0,lasts.length-1)];
}

// ─── AI DRIVER NAME POOL (American names) ────────────────────────────
const AI_FIRST = [
  'Kyle','Jimmy','Dale','Bobby','Ronnie','Chase','Tyler','Rick','Austin','Sammy',
  'Devin','Nate','Cole','Brady','Zach','Marcus','Joey','Pete','Garrett','Hank',
  'Luke','Cody','Ray','Brent','Travis','Dustin','Mitch','Greg','Aaron','Vince',
];

const AI_LAST = [
  'McAllister','Hayes','Whitfield','Tremont','Stacks','Duvall','Boone','Cantrell',
  'Phelps','Gross','Hargrove','Wicker','Farris','Holt','Tunnell','Deen','Ruiz',
];

function generateAIName(region) {
  // If an international region is specified, use region-appropriate names
  if (region && INTL_REGIONS.includes(region)) {
    return generateIntlName(region);
  }
  const first = AI_FIRST[rand(0, AI_FIRST.length-1)];
  const last  = AI_LAST[rand(0,  AI_LAST.length-1)];
  const name  = first + ' ' + last;
  // 12% suffix — authentic to American short-track culture
  return Math.random() < 0.12 ? name + ' Jr.' : name;
}
