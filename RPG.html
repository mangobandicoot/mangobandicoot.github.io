<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Throttle v1.5.2-SIM</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:Arial,sans-serif;background:#04060E;color:#E2E8F0;font-size:16px;line-height:1.45}
input,textarea,select,button{font-family:inherit;font-size:15px}
input,textarea,select{background:#131822;border:1px solid #64748B;border-radius:6px;color:#F9FAFB;padding:8px 11px}
input:focus,textarea:focus,select:focus{outline:2px solid #D97706;outline-offset:1px}
button{cursor:pointer;border:none;border-radius:6px;font-weight:700;transition:filter 0.15s}
button:not(:disabled):hover{filter:brightness(1.12)}
button:disabled{opacity:0.35;cursor:not-allowed}
.btn{padding:8px 18px;font-size:14px}
.btn-lg{padding:11px 24px;font-size:16px}
.btn-full{width:100%}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-primary{background:#D97706;color:#000}
.btn-ghost{background:transparent;color:#CBD5E1;border:1px solid #64748B}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#setup-screen{position:fixed;inset:0;background:#04060E;display:flex;align-items:center;justify-content:center;z-index:999}
#setup-screen.hidden{display:none}
#header{background:#080C14;border-bottom:2px solid #1E2433;padding:10px 24px;display:flex;align-items:center;gap:20px}
.driver-name{font-size:22px;font-weight:900;color:#F59E0B}
.hdr-stats{display:flex;gap:24px;margin-left:auto}
.hdr-stat .val{font-size:17px;font-weight:800;color:#F9FAFB}
.hdr-stat .lbl{font-size:12px;color:#94A3B8;text-transform:uppercase}
#tabs{background:#080C14;border-bottom:2px solid #1E2433;display:flex;gap:2px;padding:6px 24px 0}
.tab{background:transparent;border:none;border-bottom:3px solid transparent;color:#94A3B8;padding:7px 16px;font-size:13px;font-weight:700;text-transform:uppercase;cursor:pointer}
.tab:hover{color:#E2E8F0}
.tab.active{color:#F59E0B;border-bottom-color:#F59E0B}
#content{flex:1;overflow-y:auto;padding:24px}
.page{max-width:980px;margin:0 auto}
.page-title{font-size:26px;font-weight:900;margin-bottom:6px;color:#F9FAFB}
.page-sub{font-size:15px;color:#94A3B8;margin-bottom:20px}
.card{background:#0B0F1A;border:1px solid #1E2433;border-radius:10px;padding:18px;margin-bottom:14px}
.card-title{font-size:14px;color:#94A3B8;text-transform:uppercase;margin-bottom:12px;font-weight:700}
.stat-bar{margin-bottom:10px}
.stat-bar .sb-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px}
.stat-bar .sb-lbl{color:#94A3B8}
.stat-bar .sb-val{color:#E5E7EB;font-weight:700}
.row-item{display:flex;align-items:center;gap:14px;background:#060A10;border:1px solid #1E2433;border-radius:8px;padding:11px 14px;margin-bottom:8px}
.row-name{font-size:15px;font-weight:800;color:#F9FAFB}
.row-sub{font-size:14px;color:#94A3B8;margin-top:2px}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px}
#modal-overlay.hidden{display:none}
#modal-box{background:#0B0F1A;border:1px solid #64748B;border-radius:14px;padding:26px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto}
.modal-title{font-size:22px;font-weight:900;color:#F9FAFB;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.setup-box{text-align:center;max-width:480px;width:100%;padding:24px}
.setup-logo{font-size:78px;font-weight:900;color:#F59E0B;margin-bottom:10px}
.setup-card{background:#0B0F1A;border:1px solid #1E2433;border-radius:12px;padding:30px}
.setup-card input,.setup-card select{width:100%;font-size:20px;font-weight:700;text-align:center;margin-bottom:18px}
</style>
</head>
<body>
<div id="setup-screen">
<div class="setup-box">
<div class="setup-logo">FULL THROTTLE</div>
<div class="setup-card">
<input id="driver-name-input" type="text" placeholder="Driver Name" required>
<input id="driver-number-input" type="number" placeholder="Car Number" min="0" max="999" required>
<select id="driver-state-input">
<option value="ME" selected>Maine</option>
<option value="NC">North Carolina</option>
<option value="CA">California</option>
<option value="TX">Texas</option>
<option value="FL">Florida</option>
</select>
<button type="button" class="btn btn-lg btn-primary btn-full" onclick="startGame()">START CAREER</button>
</div>
<div style="font-size:11px;color:#64748B;margin-top:16px">Build v50 - Complete Edition</div>
</div>
</div>
<div id="app" style="display:none">
<div id="header"></div>
<div id="tabs"></div>
<div id="content"></div>
</div>
<div id="modal-overlay" class="hidden"><div id="modal-box"></div></div>

<script>
const SERIES=[
{id:'mini_stock',name:'Mini Stock',races:10,pay:120,win:600,reqRep:0,reqFans:0},
{id:'street_stock',name:'Street Stock',races:12,pay:280,win:1200,reqRep:35,reqFans:200},
{id:'late_model',name:'Late Model',races:16,pay:1800,win:7000,reqRep:80,reqFans:800},
{id:'cup',name:'Cup Series',races:36,pay:200000,win:1000000,reqRep:320,reqFans:200000},
];

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function fmt(n){return'$'+n.toLocaleString()}
function $(id){return document.getElementById(id)}
function getSeries(id){return SERIES.find(s=>s.id===id)}
//AI rivals
const FIRST_NAMES=['Tyler','Kyle','Chase','Ryan','Denny','Kevin','Brad','Joey','Martin','Austin','William','Alex','Christopher','Bubba','Erik','Ross','Daniel','Corey','AJ','Justin'];
const LAST_NAMES=['Wallace','Larson','Elliott','Blaney','Hamlin','Harvick','Keselowski','Logano','Truex','Dillon','Byron','Bowman','Bell','Jones','Chastain','Suarez','Hemric','LaJoie','Allmendinger','Haley'];

function generateAIDriver(){
const fn=FIRST_NAMES[rand(0,FIRST_NAMES.length-1)];
const ln=LAST_NAMES[rand(0,LAST_NAMES.length-1)];
return{
id:uid(),
name:fn+' '+ln,
skill:rand(60,95),
};
}

function generateDriverField(count){
const drivers=[];
for(let i=0;i<count;i++){
drivers.push(generateAIDriver());
}
return drivers.sort((a,b)=>b.skill-a.skill);
}

function initState(name,num,state){
return{
driverName:name,carNumber:num,homeState:state,
season:1,money:5000,rep:0,fans:0,
wins:0,top5s:0,starts:0,poles:0,
contracts:[],offers:[],
schedules:{},standings:{},
drivers:generateDriverField(25),
log:['Season 1 begins.'],
}
}

function save(s){localStorage.setItem('ft_save',JSON.stringify(s))}
function load(){try{return JSON.parse(localStorage.getItem('ft_save'))}catch(e){return null}}

function makeContract(seriesId){
const s=getSeries(seriesId);
const teams=['Local Racing','Speed Shop','County Motors','Regional Racing'];
return{
id:uid(),
team:teams[rand(0,teams.length-1)],
seriesId:seriesId,
races:s.races,
completed:0,
prizeShare:0.7,
};
}

function generateOffers(rep,fans){
const offers=[];
SERIES.forEach(s=>{
if(rep>=s.reqRep&&fans>=s.reqFans){
if(Math.random()<0.6)offers.push(makeContract(s.id));
}
});
if(offers.length===0)offers.push(makeContract('mini_stock'));
return offers.slice(0,3);
}

const TRACKS=[
{name:'Daytona International Speedway',short:'Daytona',city:'Daytona Beach',state:'FL',type:'superspeedway'},
{name:'Charlotte Motor Speedway',short:'Charlotte',city:'Concord',state:'NC',type:'intermediate'},
{name:'Bristol Motor Speedway',short:'Bristol',city:'Bristol',state:'TN',type:'short'},
{name:'Martinsville Speedway',short:'Martinsville',city:'Martinsville',state:'VA',type:'short'},
{name:'Talladega Superspeedway',short:'Talladega',city:'Talladega',state:'AL',type:'superspeedway'},
{name:'Richmond Raceway',short:'Richmond',city:'Richmond',state:'VA',type:'short'},
{name:'Phoenix Raceway',short:'Phoenix',city:'Avondale',state:'AZ',type:'intermediate'},
{name:'Atlanta Motor Speedway',short:'Atlanta',city:'Hampton',state:'GA',type:'intermediate'},
{name:'Las Vegas Motor Speedway',short:'Las Vegas',city:'Las Vegas',state:'NV',type:'intermediate'},
{name:'Auto Club Speedway',short:'Fontana',city:'Fontana',state:'CA',type:'intermediate'},
{name:'Dover Motor Speedway',short:'Dover',city:'Dover',state:'DE',type:'intermediate'},
{name:'Kansas Speedway',short:'Kansas',city:'Kansas City',state:'KS',type:'intermediate'},
{name:'Texas Motor Speedway',short:'Texas',city:'Fort Worth',state:'TX',type:'intermediate'},
{name:'Pocono Raceway',short:'Pocono',city:'Long Pond',state:'PA',type:'triangle'},
{name:'Michigan International Speedway',short:'Michigan',city:'Brooklyn',state:'MI',type:'intermediate'},
{name:'Watkins Glen International',short:'The Glen',city:'Watkins Glen',state:'NY',type:'road'},
{name:'Indianapolis Motor Speedway',short:'Indy',city:'Indianapolis',state:'IN',type:'intermediate'},
{name:'Darlington Raceway',short:'Darlington',city:'Darlington',state:'SC',type:'intermediate'},
{name:'Nashville Superspeedway',short:'Nashville',city:'Nashville',state:'TN',type:'intermediate'},
{name:'Road America',short:'Road America',city:'Elkhart Lake',state:'WI',type:'road'},
];
// Real NASCAR tracks
function generateSchedule(seriesId){
const s=getSeries(seriesId);
const sched=[];
const usedTracks=[];
for(let i=0;i<s.races;i++){
let track;
do{
track=TRACKS[rand(0,TRACKS.length-1)];
}while(usedTracks.includes(track.short)&&usedTracks.length<TRACKS.length);
usedTracks.push(track.short);
sched.push({
round:i+1,
track:track.short,
trackFull:track.name,
city:track.city,
state:track.state,
type:track.type,
qualifying:null,
result:null
});
}
return sched;
}


function simulateQualifying(state,seriesId){
const fieldSize=Math.min(20,state.drivers.length+1);
const baseRoll=Math.random()*100;
const pos=Math.round(fieldSize*(1-baseRoll/115))+1;
const position=Math.max(1,Math.min(fieldSize,pos));

const field=[{name:state.driverName,position:position,player:true}];
const aiDrivers=state.drivers.slice(0,fieldSize-1).map((d,i)=>{
let aiPos=i+1;
if(aiPos>=position)aiPos++;
return{name:d.name,position:aiPos,player:false};
});

field.push(...aiDrivers);
field.sort((a,b)=>a.position-b.position);

return{position:position,pole:position===1,fieldSize:fieldSize,field:field};
}

//Race Simulation 
function simulateRace(state,seriesId,qualPos){
const fieldSize=20;
const allScenarios=[
{text:'Green flag drops. The field roars into turn 1 in a tight pack. Someone ahead gets loose and causes a chain reaction of checking up.',choices:[
{label:'Dive low and thread the needle',posMod:3,risk:0.15},
{label:'Lift early and play it safe',posMod:-1,risk:0.02},
]},
{text:'Lap 45. You\'re running door-to-door with the 22 car. He pinches you toward the wall entering turn 3.',choices:[
{label:'Stand your ground and hold your line',posMod:2,risk:0.12},
{label:'Back out and tuck in behind him',posMod:0,risk:0.01},
]},
{text:'Caution flag. Crew chief radios: "Two tires or four? Track position or fresh rubber?"',choices:[
{label:'Take two tires - get out first',posMod:2,risk:0.08},
{label:'Take four tires - lose spots but gain grip',posMod:-2,risk:0.02},
]},
{text:'Restart with 30 to go. The 8 car sends it too hard into turn 1, smoke everywhere. You\'re committed.',choices:[
{label:'Gas it and hope for a hole',posMod:3,risk:0.18},
{label:'Check up hard and hope you don\'t get hit',posMod:-1,risk:0.09},
]},
{text:'Final 10 laps. You\'re in the lead pack. The 17 car is all over your bumper, looking for a way by.',choices:[
{label:'Block aggressively - protect your spot',posMod:1,risk:0.11},
{label:'Run your line and make him work for it',posMod:0,risk:0.03},
]},
{text:'White flag - final lap! Three wide coming to the checkers. This is it.',choices:[
{label:'Send it to the bottom and pray',posMod:4,risk:0.22},
{label:'Hold your lane and fight for every inch',posMod:1,risk:0.07},
]},
];

const scenarios=[];
const used=[];
while(scenarios.length<6&&used.length<allScenarios.length){
const idx=rand(0,allScenarios.length-1);
if(!used.includes(idx)){
used.push(idx);
scenarios.push(allScenarios[idx]);
}
}

return{pending:true,scenarios:scenarios,basePos:qualPos,fieldSize:fieldSize,dnfProb:0.12};
}


function resolveRace(pending,choices){
let pos=pending.basePos;
let dnf=Math.random()<pending.dnfProb;
choices.forEach(c=>{
pos-=c.posMod;
if(Math.random()<c.risk)dnf=true;
});
pos=Math.max(1,Math.min(pending.fieldSize,pos));
if(dnf)pos=pending.fieldSize;
const points=dnf?0:(43-pos+1);
const s=getSeries('mini_stock');
const prize=pos===1?s.pay+s.win:Math.floor(s.pay*(0.7-(pos/pending.fieldSize)*0.6));
return{position:pos,dnf:dnf,points:points,prize:prize,pole:false};
}

function processResult(state,seriesId,raceIdx,result){
const contract=state.contracts.find(c=>c.seriesId===seriesId);
if(contract)contract.completed++;
state.starts++;
if(result.position===1)state.wins++;
if(result.position<=5)state.top5s++;
if(result.pole)state.poles++;
const playerPrize=Math.floor(result.prize*(contract?contract.prizeShare:0.7));
state.money+=playerPrize;
state.rep+=result.position===1?10:result.position<=5?5:1;
state.fans+=result.position===1?rand(100,300):rand(10,50);
if(!state.standings[seriesId])state.standings[seriesId]={};
state.standings[seriesId][state.driverName]=(state.standings[seriesId][state.driverName]||0)+result.points;
const sched=state.schedules[seriesId];
sched[raceIdx].result=result;
state.log.push((result.dnf?'DNF':'P'+result.position)+' at '+sched[raceIdx].track+' - '+fmt(playerPrize));
save(state);
}

let currentPage='dashboard';
let st=null;

function updateHeader(){
$('header').innerHTML='<div><div class="driver-name">#'+st.carNumber+' '+st.driverName+'</div></div><div class="hdr-stats"><div class="hdr-stat"><div class="val">'+fmt(st.money)+'</div><div class="lbl">Money</div></div><div class="hdr-stat"><div class="val">'+st.rep+'</div><div class="lbl">Rep</div></div><div class="hdr-stat"><div class="val">'+st.wins+'</div><div class="lbl">Wins</div></div></div>';
}

function updateTabs(){
const tabs=['dashboard','contracts','schedule','standings','settings'];
$('tabs').innerHTML=tabs.map(t=>'<button class="tab '+(currentPage===t?'active':'')+'" onclick="showPage(\''+t+'\')">'+t.toUpperCase()+'</button>').join('');
}

function showPage(page){
currentPage=page;
updateTabs();
if(page==='dashboard')renderDashboard();
else if(page==='contracts')renderContracts();
else if(page==='schedule')renderSchedule();
else if(page==='standings')renderStandings();
else if(page==='settings')renderSettings();
}
function renderDashboard(){
const active=st.contracts.filter(c=>c.completed<c.races);
const upcoming=[];
active.forEach(c=>{
const sched=st.schedules[c.seriesId]||[];
const next=sched.find(r=>!r.result);
if(next)upcoming.push({contract:c,race:next,series:getSeries(c.seriesId)});
});

let html='<div class="page"><div class="page-title">Dashboard</div><div class="page-sub">Season '+st.season+'</div>';
html+='<div class="card"><div class="card-title">Career Stats</div>';
html+='<div class="stat-bar"><div class="sb-row"><span class="sb-lbl">Starts</span><span class="sb-val">'+st.starts+'</span></div></div>';
html+='<div class="stat-bar"><div class="sb-row"><span class="sb-lbl">Wins</span><span class="sb-val">'+st.wins+'</span></div></div>';
html+='<div class="stat-bar"><div class="sb-row"><span class="sb-lbl">Top 5s</span><span class="sb-val">'+st.top5s+'</span></div></div>';
html+='</div>';

if(upcoming.length>0){
html+='<div class="card"><div class="card-title">Next Races</div>';
upcoming.forEach(u=>{
html+='<div class="row-item"><div style="flex:1"><div class="row-name">'+u.race.track+'</div><div class="row-sub">'+u.series.name+' - Round '+u.race.round+'</div></div>';
html+='<button class="btn btn-sm btn-primary" onclick="startQualifying(\''+u.contract.seriesId+'\','+u.race.round+')">Qualify</button></div>';
});
html+='</div>';
}else{
html+='<div class="card"><div style="text-align:center;padding:30px;color:#64748B">No active races. Sign a contract to get started.</div></div>';
}

html+='<div class="card"><div class="card-title">Recent Log</div>';
st.log.slice(-5).reverse().forEach(l=>{
html+='<div style="font-size:13px;color:#94A3B8;padding:5px 0;border-bottom:1px solid #222">'+l+'</div>';
});
html+='</div></div>';

$('content').innerHTML=html;
}

function renderContracts(){
const active=st.contracts.filter(c=>c.completed<c.races);
const offers=st.offers||[];

let html='<div class="page"><div class="page-title">Contracts</div>';

if(active.length>0){
html+='<div class="card"><div class="card-title">Active Contracts</div>';
active.forEach(c=>{
const s=getSeries(c.seriesId);
html+='<div class="row-item"><div style="flex:1"><div class="row-name">'+c.team+'</div><div class="row-sub">'+s.name+' - '+c.completed+'/'+c.races+' races</div></div></div>';
});
html+='</div>';
}

if(offers.length>0){
html+='<div class="card"><div class="card-title">Contract Offers</div>';
offers.forEach(o=>{
const s=getSeries(o.seriesId);
html+='<div class="row-item"><div style="flex:1"><div class="row-name">'+o.team+'</div><div class="row-sub">'+s.name+' - '+o.races+' races</div></div>';
html+='<button class="btn btn-sm btn-primary" onclick="signContract(\''+o.id+'\')">Sign</button></div>';
});
html+='</div>';
}else if(active.length===0){
html+='<div class="card"><div style="text-align:center;padding:30px;color:#64748B">No contract offers. Build reputation and fans.</div></div>';
}

html+='</div>';
$('content').innerHTML=html;
}

function renderSchedule(){
const active=st.contracts;
let html='<div class="page"><div class="page-title">Schedule</div>';

active.forEach(c=>{
const s=getSeries(c.seriesId);
const sched=st.schedules[c.seriesId]||[];
html+='<div class="card"><div class="card-title">'+s.name+'</div>';
sched.forEach(r=>{
html+='<div class="row-item"><div style="flex:1"><div class="row-name">Round '+r.round+': '+r.track+'</div>';
if(r.result)html+='<div class="row-sub">'+(r.result.dnf?'DNF':'P'+r.result.position)+' - '+r.result.points+' pts</div>';
html+='</div></div>';
});
html+='</div>';
});

if(active.length===0)html+='<div class="card"><div style="text-align:center;padding:30px;color:#64748B">No active schedules.</div></div>';

html+='</div>';
$('content').innerHTML=html;
}

function renderStandings(){
let html='<div class="page"><div class="page-title">Standings</div>';

Object.keys(st.standings).forEach(seriesId=>{
const s=getSeries(seriesId);
const pts=st.standings[seriesId];
const list=Object.entries(pts).map(([name,points])=>({name:name,points:points,player:name===st.driverName})).sort((a,b)=>b.points-a.points);
html+='<div class="card"><div class="card-title">'+s.name+'</div>';
list.forEach((d,i)=>{
html+='<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #222'+(d.player?';font-weight:700;color:#F59E0B':'')+'"><span>'+(i+1)+'. '+d.name+'</span><span>'+d.points+' pts</span></div>';
});
html+='</div>';
});

if(Object.keys(st.standings).length===0)html+='<div class="card"><div style="text-align:center;padding:30px;color:#64748B">No standings yet.</div></div>';

html+='</div>';
$('content').innerHTML=html;
}

function renderSettings(){
let html='<div class="page"><div class="page-title">Settings</div>';
html+='<div class="card"><div class="card-title">Save & Export</div>';
html+='<button class="btn btn-primary btn-full" onclick="exportSave()">Download Save</button>';
html+='</div>';
html+='<div class="card"><div class="card-title">Danger Zone</div>';
html+='<button class="btn btn-ghost btn-full" style="border-color:#EF4444;color:#EF4444" onclick="resetGame()">Reset Career</button>';
html+='</div></div>';
$('content').innerHTML=html;
}

function signContract(id){
const offer=st.offers.find(o=>o.id===id);
if(!offer)return;
st.contracts.push(offer);
st.offers=st.offers.filter(o=>o.id!==id);
st.schedules[offer.seriesId]=generateSchedule(offer.seriesId);
st.log.push('Signed with '+offer.team);
save(st);
showPage('contracts');
}

function exportSave(){
const json=JSON.stringify(st,null,2);
const blob=new Blob([json],{type:'application/json'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;
a.download='fullthrottle_'+st.driverName+'_s'+st.season+'.json';
a.click();
URL.revokeObjectURL(url);
}

function resetGame(){
if(confirm('Delete career permanently?')){
localStorage.removeItem('ft_save');
location.reload();
}
}
let pendingRace=null;
let raceChoices=[];

function showModal(html){
$('modal-box').innerHTML=html;
$('modal-overlay').classList.remove('hidden');
}

function closeModal(){
$('modal-overlay').classList.add('hidden');
}
//Simulate Qualifying
function startQualifying(seriesId,round){
const sched=st.schedules[seriesId];
const race=sched[round-1];

if(race.qualifying){
startRace(seriesId,round);
return;
}

const qualResult=simulateQualifying(st,seriesId);
race.qualifying=qualResult;
if(qualResult.pole)st.poles++;
save(st);

let html='<div class="modal-title">Qualifying Results</div>';
html+='<div style="background:#060A10;border-radius:8px;padding:14px 16px;margin:16px 0">';
html+='<div><div style="font-size:12px;color:#94A3B8">Position</div><div style="font-size:22px;font-weight:900;color:'+(qualResult.pole?'#F59E0B':'#F9FAFB')+'">'+(qualResult.pole?'POLE':'P'+qualResult.position)+'</div></div>';
html+='<div style="margin-top:10px"><div style="font-size:12px;color:#94A3B8">Field Size</div><div style="font-size:22px;font-weight:900">'+qualResult.fieldSize+'</div></div>';
html+='</div>';

if(qualResult.field){
html+='<div style="max-height:200px;overflow-y:auto;background:#0B0F1A;border-radius:6px;padding:10px;margin-top:12px">';
qualResult.field.slice(0,10).forEach(function(d){
html+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;'+(d.player?'font-weight:700;color:#F59E0B':'color:#94A3B8')+'"><span>P'+d.position+'</span><span>'+d.name+'</span></div>';
});
html+='</div>';
}

html+='<div class="modal-actions"><button class="btn btn-primary" onclick="startRace(\''+seriesId+'\','+round+')">Continue to Race</button></div>';
showModal(html);
}

function startRace(seriesId,round){
const sched=st.schedules[seriesId];
const race=sched[round-1];

if(race.result){
alert('Race already completed');
closeModal();
return;
}

const qualPos=race.qualifying?race.qualifying.position:10;
pendingRace=simulateRace(st,seriesId,qualPos);
pendingRace.seriesId=seriesId;
pendingRace.round=round;
raceChoices=[];

showRaceScenario(0);
}

function showRaceScenario(idx){
if(idx>=pendingRace.scenarios.length){
finishRace();
return;
}

const scenario=pendingRace.scenarios[idx];

let html='<div class="modal-title">Race Scenario '+(idx+1)+'/'+pendingRace.scenarios.length+'</div>';
html+='<div style="background:#060A10;border:1px solid #2D3748;border-radius:10px;padding:18px;margin-bottom:12px">';
html+='<div style="font-size:15px;color:#CBD5E1;line-height:1.7;margin-bottom:14px">'+scenario.text+'</div>';
html+='<div style="display:flex;flex-direction:column;gap:7px">';
scenario.choices.forEach((ch,i)=>{
html+='<button class="btn btn-primary btn-full" style="text-align:left;background:#0B0F1A;border:1px solid #2D3748;color:#E2E8F0" onclick="makeChoice('+idx+','+i+')">'+ch.label+'</button>';
});
html+='</div></div>';
showModal(html);
}

function makeChoice(scenarioIdx,choiceIdx){
const scenario=pendingRace.scenarios[scenarioIdx];
const choice=scenario.choices[choiceIdx];
raceChoices.push({posMod:choice.posMod,risk:choice.risk});

let html='<div class="modal-title">Result</div>';
html+='<div style="border-radius:8px;padding:14px 16px;margin-top:12px;border-left:3px solid #10B981;background:#06130e">';
html+='<div style="font-size:15px;font-weight:800;color:#F9FAFB;margin-bottom:4px">Choice Made</div>';
html+='<div style="font-size:14px;color:#94A3B8">'+choice.label+'</div>';
html+='</div>';
html+='<div class="modal-actions"><button class="btn btn-primary" onclick="showRaceScenario('+(scenarioIdx+1)+')">'+(scenarioIdx+1<pendingRace.scenarios.length?'Next Scenario':'See Results')+'</button></div>';
showModal(html);
}

function finishRace(){
const result=resolveRace(pendingRace,raceChoices);
processResult(st,pendingRace.seriesId,pendingRace.round-1,result);

let html='<div class="modal-title">Race Complete</div>';
html+='<div style="background:#060A10;border-radius:8px;padding:14px 16px;margin:16px 0">';
if(result.dnf){
html+='<div style="font-size:32px;font-weight:900;color:#EF4444">DNF</div>';
}else{
html+='<div style="font-size:32px;font-weight:900;color:'+(result.position===1?'#F59E0B':'#F9FAFB')+'">'+(result.position===1?'WINNER':'P'+result.position)+'</div>';
html+='<div style="margin-top:16px"><div style="font-size:12px;color:#94A3B8">Points</div><div style="font-size:20px;font-weight:900">'+result.points+'</div></div>';
html+='<div style="margin-top:10px"><div style="font-size:12px;color:#94A3B8">Prize</div><div style="font-size:20px;font-weight:900;color:#10B981">'+fmt(result.prize)+'</div></div>';
}
html+='</div>';
html+='<div class="modal-actions"><button class="btn btn-primary" onclick="closeModal();showPage(\'dashboard\')">Continue</button></div>';
showModal(html);

pendingRace=null;
raceChoices=[];
updateHeader();
}
window.startGame=function(){
const name=$('driver-name-input').value.trim();
const num=parseInt($('driver-number-input').value);
const state=$('driver-state-input').value;

if(!name){alert('Enter driver name');return}
if(isNaN(num)||num<0||num>999){alert('Enter valid car number (0-999)');return}

st=initState(name,num,state);
st.offers=generateOffers(st.rep,st.fans);
save(st);

$('setup-screen').classList.add('hidden');
$('app').style.display='flex';

updateHeader();
updateTabs();
showPage('dashboard');
};

document.addEventListener('DOMContentLoaded',function(){
const saved=load();

if(saved){
st=saved;
$('setup-screen').classList.add('hidden');
$('app').style.display='flex';
updateHeader();
updateTabs();
showPage('dashboard');
}
});

$('modal-overlay').addEventListener('click',function(e){
if(e.target===$('modal-overlay'))closeModal();
});

console.log('Full Throttle v1.5.2-SIM loaded');
console.log('Minimal working version - core gameplay only');
</script>
