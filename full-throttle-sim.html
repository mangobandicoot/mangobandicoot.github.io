function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function randF(min, max) {
  return Math.random() * (max - min) + min;
}

function clamp(val, min, max) {
  return Math.max(min, Math.min(max, val));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function fmtMoney(n) {
  return '$' + n.toLocaleString();
}

function fmtFans(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toString();
}

function ordinal(n) {
  const s = ['th', 'st', 'nd', 'rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function getAttrBonus(attrs, id) {
  const val = (attrs[id] || DRIVER_ATTR_DEFAULT) - DRIVER_ATTR_DEFAULT;
  return val;
}

function getUpgradeBonus(upgrades, bonusType) {
  let total = 0;
  CAR_UPGRADES.forEach(upg => {
    const lvl = upgrades[upg.id] || 0;
    if (lvl > 0) {
      const tier = upg.tiers[lvl - 1];
      total += tier.bonus[bonusType] || 0;
    }
  });
  return total;
}

function findOrCreateDriver(state, name) {
  let d = (state.drivers || []).find(dr => dr.name === name);
  if (!d) {
    d = createDriver(name, rand(40, 75), null, 'known');
    state.drivers.push(d);
  }
  return d;
}

function touchRival(rivals, name, type, clean=true) {
  let r = rivals.find(x => x.name === name);
  if (!r) { r={name,incidents:0,closeRaces:0,cleanBattles:0}; rivals.push(r); }
  if (type==='incident') r.incidents++;
  if (type==='close') { r.closeRaces++; if(clean) r.cleanBattles=(r.cleanBattles||0)+1; }
}

function relationship(r) {
  const i=r.incidents||0, c=r.closeRaces||0, cb=r.cleanBattles||0;
  if (r.chosen==='chosen_rival') return 'chosen_rival';
  if (r.chosen==='chosen_friend') return 'chosen_friend';
  if (i>=3&&c>=4) return 'frenemy';
  if (i>=3) return 'rival';
  if (c>=4) return cb>=c*0.7 ? 'racing_rival' : 'friend';
  return 'acquaintance';
}

}

function maybeFireCallout(state, driverName, type) {
  if (!driverName || !driverName.trim()) return;
  const existing = (state.rivals||[]).find(r=>r.name===driverName);
  const isChosen = existing && (existing.chosen==='chosen_rival'||existing.chosen==='chosen_friend');
  const chance = type==='incident' ? (isChosen ? 0.65 : 0.45) : (isChosen ? 0.50 : 0.30);
  if (Math.random() > chance) return;

  const lines = type==='incident' 
    ? [driverName+" went straight to social media after the race. \"That move was completely unnecessary.\""]
    : ["In victory lane, "+driverName+" pointed across the track at you. \"That's the one to watch.\""];
  const line = lines[0].replace(/{name}/g, driverName).replace(/{player}/g, state.driverName);

  state.dramaQueue.push({
    id: 'callout_' + uid(),
    title: type==='incident' ? driverName+' Calls You Out' : driverName+' Gives You Props',
    effect: 'none',
    desc: line,
    valence: type==='incident' ? 'bad' : 'good',
    _isCallout: true,
    _calloutType: type,
    _calloutDriver: driverName,
  });
}

function rollD100(){return Math.random()*100;}
function rollD20(){return rand(1,20);}

function buildSimContext(state, seriesId, raceIdx, currentPos, fieldSize, lapNum, totalLaps) {
  const sched = state.schedules[seriesId]||[];
  const race = sched[raceIdx]||{};
  const topRival = (state.rivals||[]).sort((a,b)=>(b.incidents+b.closeRaces)-(a.incidents+a.closeRaces))[0];
  return {
    lap: lapNum,
    pos: currentPos,
    fieldSize,
    lapsLeft: totalLaps - lapNum,
    condition: race.condition||'clear',
    rival: topRival?.name||null,
    driverAttrs: state.driverAttrs||{},
    carUpgrades: state.carUpgrades||{},
    seriesId,
  };
}

function pickScenarios(ctx, count, pool) {
  const eligible = pool.filter(s => s.when(ctx));
  if (!eligible.length) return [];
  const picked = [];
  const used = new Set();
  let attempts = 0;
  while (picked.length < count && attempts < 50) {
    attempts++;
    const total = eligible.reduce((s,e) => used.has(e.id)?s:s+e.weight, 0);
    let r = Math.random() * total;
    for (const s of eligible) {
      if (used.has(s.id)) continue;
      r -= s.weight;
      if (r <= 0) { picked.push(s); used.add(s.id); break; }
    }
  }
  return picked;
}

function simulateQualifying(state, seriesId, raceIdx) {
  const s = getSeries(seriesId);
  const fieldSize = SERIES_FIELD_SIZE[seriesId]||20;
  const attrs = state.driverAttrs||{};
  const upgrades = state.carUpgrades||{};

  let baseRoll = rollD100();
  const qualAttr = getAttrBonus(attrs, 'qualifying');
  baseRoll += qualAttr * 4;
  baseRoll += getUpgradeBonus(upgrades, 'speedBonus') * 0.4;
  baseRoll += (state.confidence||0) * 3;

  const contract = (state.contracts||[]).find(c=>c.seriesId===seriesId);
  const crewPkg = CREW_PACKAGES.find(p=>p.id===(contract?.crewPackage||'basic'));
  if (crewPkg) baseRoll += crewPkg.qualBonus * 2;

  baseRoll = clamp(baseRoll, 1, 115);
  const pctile = baseRoll / 115;
  const rawPos = Math.round(fieldSize * (1 - pctile * 0.95)) + 1;
  const position = clamp(rawPos, 1, fieldSize);
  const pole = position === 1;

  return { position, pole, fieldSize };
}

function resolveRace(pendingRace, choiceResults) {
  const {basePos, fieldSize, dnfRoll, dnfProb, baseSkill, lateRaceBonus, condBonus, qualPosition, seriesId, raceIdx, narrativeDelta} = pendingRace;
  const s = getSeries(seriesId);

  let totalPosDelta = 0;
  let extraDNFRisk = 0;
  let extraFanBonus = 0;
  const incidentDrivers = [];

  choiceResults.forEach(cr => {
    totalPosDelta += cr.posDelta||0;
    extraDNFRisk += cr.dnfRisk||0;
    extraFanBonus += cr.fanBonus||0;
    if (cr.incidentDriver) incidentDrivers.push(cr.incidentDriver);
  });

  if (narrativeDelta) totalPosDelta += narrativeDelta;
  const skillDrift = baseSkill * randF(0.5, 1.5);
  totalPosDelta += skillDrift;
  totalPosDelta += lateRaceBonus * randF(0.5, 1.5);
  totalPosDelta += condBonus;

  const finalDNFProb = dnfProb + extraDNFRisk;
  const isDNF = (dnfRoll + (extraDNFRisk * 0.5)) < finalDNFProb;

  if (isDNF) {
    const dnfReasons = ['engine failure','crash damage','fuel issue'];
    const dnfReason = dnfReasons[rand(0,dnfReasons.length-1)];
    return {
      position: fieldSize,
      dnf: true,
      dnfReason,
      fieldSize,
      points: 0,
      prize: 0,
      pole: false,
      lapsLed: false,
      mostLaps: false,
      closeFinishes: [],
      incidentDrivers,
    };
  }

  let finalPos = basePos - Math.round(totalPosDelta);
  finalPos = clamp(finalPos, 1, fieldSize);

  const lapsLed = finalPos <= 5 && Math.random() < 0.4;
  const mostLaps = finalPos === 1 && Math.random() < 0.5;
  const closeFinishes = [];

  const points = calcPoints(seriesId, finalPos, finalPos===1, lapsLed, mostLaps);
  const prize = calcPrize(seriesId, finalPos, fieldSize);

  return {
    position: finalPos,
    dnf: false,
    dnfReason: null,
    fieldSize,
    points,
    prize,
    pole: qualPosition === 1,
    lapsLed,
    mostLaps,
    closeFinishes,
    incidentDrivers,
  };
}

function calcPoints(seriesId,pos,pole,lapsLed,mostLaps){
  return (IRACING_PTS[Math.max(0,pos-1)]||1)+(pole?1:0)+(lapsLed?1:0)+(mostLaps?3:0);
}

function calcPrize(seriesId,pos,fs){
  const s=getSeries(seriesId);
  if(pos===1)return s.pay+s.winBonus;
  const pct=Math.max(0.10,0.70-((pos-2)/(fs-2))*0.60);
  return Math.floor(s.pay*pct);
}

function buildFinishOrder(state, seriesId, playerPos, fieldSize) {
  const drivers = (state.drivers||[]).filter(d=>d.currentSeriesId===seriesId&&d.active).slice(0, fieldSize-1);
  const order = [];
  for (let i=1; i<=fieldSize; i++) {
    if (i === playerPos) {
      order.push({name: state.driverName, isPlayer: true, gap: i===1?'---':'-'+(i*0.3).toFixed(3)});
    } else {
      const d = drivers[i > playerPos ? i-2 : i-1];
      if (d) order.push({name: d.name, isPlayer: false, gap: i===1?'---':'-'+(i*0.3).toFixed(3)});
    }
  }
  return order;
}

<script>

function generateSchedule(seriesId,trackPools){
  const s=getSeries(seriesId);
  const isFree=seriesId==='mini_stock'||seriesId==='street_stock'||seriesId==='super_late_model';
  const pool=trackPools?(isFree?trackPools.free:trackPools.paid):(isFree?FREE_TRACKS:PAID_TRACKS);
  const slinger=isFree?pool.find(t=>t.fig8):null;
  const rest=slinger?pool.filter(t=>!t.fig8):pool;
  const mainCount=s.races-(slinger?1:0);
  const shuffled=shuffle(rest);
  const picks=[];
  while(picks.length<mainCount)shuffled.forEach(t=>{if(picks.length<mainCount)picks.push(t);});
  if(slinger)picks.push(slinger);
  return picks.map((t,i)=>({
    round:i+1,track:t.name,city:t.city,state:t.state,fig8:!!t.fig8,
    qualifying:null,result:null,bonusResult:null,condition:rollCondition(),
  }));
}

function makeContract(seriesId,quality){
  const s=getSeries(seriesId);
  const teamList=TEAMS[seriesId]||['Independent Racing'];
  const team=teamList[rand(0,teamList.length-1)];
  const mult={poor:0.7,average:1.0,good:1.3,elite:1.7}[quality];
  const termSeasons=rand(1,s.maxTerm);
  const tmCount=rand(0,Math.min(s.maxTm,quality==='elite'?3:quality==='good'?2:1));
  const prizeShare=s.tier<=3?{poor:0.60,average:0.70,good:0.78,elite:0.85}[quality]:{poor:0.70,average:0.80,good:0.88,elite:0.95}[quality];
  const signingBonus=s.tier>=4?Math.floor(s.pay*s.races*mult*randF(0.2,0.4)):0;
  return {
    id:uid(),team,seriesId,quality,salary:signingBonus,prizeShare,entryFee:s.fee,
    termSeasons,seasonsCompleted:0,winBonus:Math.floor(s.winBonus*mult*randF(0.5,0.9)),
    races:s.races,racesCompleted:0,earnings:0,missedFinishWarnings:0,
    reqFinish:quality==='elite'?8:quality==='good'?12:18,penaltyRate:0.35,buyoutRate:0.50,
    teammates:new Array(tmCount).fill(null),crewPackage:'basic',indie:false,
  };
}

function generateOffers(rep,fans){
  const offers=[];
  SERIES.forEach(s=>{
    if(rep>=s.reqRep-10&&fans>=s.reqFans*0.5){
      const q=rep>=s.reqRep+50?'good':rep>=s.reqRep+20?'average':'poor';
      if(Math.random()<(rep>=s.reqRep?0.65:0.25))offers.push(makeContract(s.id,q));
    }
  });
  if(!offers.length)offers.push(makeContract('mini_stock','poor'));
  return shuffle(offers).slice(0,4);
}

function makeSponsor(seriesId,type='primary',international=false){
  const brands=international?['Pirelli','Red Bull']:(SPONSOR_BRANDS[seriesId]||SPONSOR_BRANDS.mini_stock);

  const base=Math.floor(s.pay*(type==='primary'?3:type==='associate'?0.8:0.3)*randF(0.8,1.3));
  const seasons=rand(st.dur[0],st.dur[1]);
  return {id:uid(),brand,type:international?'international':type,seriesId,valuePerSeason:base,seasonsLeft:seasons,totalSeasons:seasons,happiness:75,winBonus:Math.floor(base*0.15),top5Bonus:Math.floor(base*0.05),minHappy:25,international};
}

}

function generateInitialDriverPool(){
  const drivers=[];
  SERIES.forEach(s=>{
    const count=SERIES_FIELD_SIZE[s.id]||20;
    for(let i=0;i<count;i++){
      const homeState=randomHomeState();
      const isIntl=typeof INTL_REGIONS!=='undefined'&&INTL_REGIONS.includes(homeState);
      let name=isIntl?generateAIName(homeState):generateAIName();
      let attempts=0;
      while(drivers.find(d=>d.name===name)&&attempts++<20){
        name=isIntl?generateAIName(homeState):generateAIName();
      }
      const d=createDriver(name,rand(25,85),s.id,'generated');

function calcMerchRevenue(fans){
  if(!fans)return 0;
  if(fans<1000)return Math.floor(fans*0.5);
  if(fans<10000)return Math.floor(500+(fans-1000)*0.3);
  if(fans<100000)return Math.floor(3200+(fans-10000)*0.15);
  return Math.floor(16700+(fans-100000)*0.08);
}

function processRaceResult(state,seriesId,raceIdx,result){
  const sched=state.schedules[seriesId];
  const race=sched[raceIdx];
  const s=getSeries(seriesId);
  const contract=state.contracts.find(c=>c.seriesId===seriesId);

  race.result=result;
  if(!result.dnf&&!result.finishOrder){result.finishOrder=buildFinishOrder(state,seriesId,result.position,result.fieldSize||18);}
  const entryFee=contract?(contract.entryFee||s.fee):s.fee;
  state.money-=entryFee;
  addLog(state,`Entry fee @ ${race.track}: -${fmtMoney(entryFee)}`);

  const prizeShare=(contract&&!contract.indie&&contract.prizeShare)?contract.prizeShare:1.0;
  const driverPrize=Math.floor((result.prize||0)*prizeShare);
  state.money+=driverPrize;
  state.totalPrizeMoney+=driverPrize;
  state.starts++;
  state.week++;

  const pts=result.points||0;
  state.championshipPoints[seriesId]=(state.championshipPoints[seriesId]||0)+pts;

  if(!result.dnf&&!result.dq){
    if(result.position===1)state.wins++;
    if(result.position<=5)state.top5s++;
  }
  if(result.pole)state.poles++;

  const repGain=result.dq?-rand(3,6):result.position===1?rand(5,9):result.position<=3?rand(2,5):result.position<=10?rand(0,2):result.dnf?-2:-1;
  state.reputation=Math.max(0,state.reputation+repGain);

  let fanGain=0;
  if(result.dq)fanGain=-rand(20,60);
  else if(result.position===1)fanGain=rand(200,500);
  else if(result.position<=5)fanGain=rand(50,200);
  else if(!result.dnf)fanGain=rand(0,30);
  else fanGain=-rand(0,20);
  if(result.pole)fanGain+=rand(30,80);

  state.fans=Math.max(0,state.fans+fanGain);

  if(!result.isFig8Bonus&&race.track){
    if(!state.trackHistory)state.trackHistory={};
    if(!state.trackHistory[race.track])state.trackHistory[race.track]={starts:0,wins:0,top5s:0,dnfs:0,positions:[],bestPos:null};
    const th=state.trackHistory[race.track];
    th.starts++;
    if(!result.dnf&&!result.dq){
      th.positions.push(result.position);
      if(result.position===1)th.wins++;
      if(result.position<=5)th.top5s++;
      if(th.bestPos===null||result.position<th.bestPos)th.bestPos=result.position;
    } else { th.dnfs++; }
  }

  state.sponsors=state.sponsors.map(sp=>{
    let h=sp.happiness;
    if(result.dnf)h-=5;
    else if(result.position===1)h+=10;
    else if(result.position<=5)h+=4;
    return {...sp,happiness:clamp(h,0,100)};
  });

  state.sponsors.forEach(sp=>{
    if(result.position===1&&sp.winBonus){state.money+=sp.winBonus;state.totalPrizeMoney+=sp.winBonus;}
  });

  state.sponsors=state.sponsors.filter(sp=>{
    if(sp.happiness<=sp.minHappy){
      addLog(state,`${sp.brand} pulled sponsorship.`);
      return false;
    }
    return true;
  });

  const closeFinishes=result.closeFinishes||[];
  closeFinishes.forEach(cf=>{
    touchRival(state.rivals,cf.name,'close',true);
    if(Math.random()<0.25)maybeFireCallout(state,cf.name,'close');
  });
  (result.incidentDrivers||[]).forEach(name=>{
    if(name.trim()){
      touchRival(state.rivals,name.trim(),'incident',false);
      if(Math.random()<0.40)maybeFireCallout(state,name.trim(),'incident');
    }
  });

  if(!state.seriesFields[seriesId])state.seriesFields[seriesId]={};
  const field=state.seriesFields[seriesId];
  (result.finishOrder||[]).forEach((entry,idx)=>{
    if(!entry.name||entry.isPlayer)return;
    const clean=entry.name.trim();if(!clean)return;
    if(!field[clean])field[clean]={points:0,wins:0,top5s:0,starts:0};
    const p=idx+1;
    field[clean].points+=IRACING_PTS[idx]||1;
    field[clean].starts++;
    if(p===1)field[clean].wins++;
    if(p===5)field[clean].top5s++;
  });

  const rivalName=(state.rivals||[]).filter(r=>['rival','frenemy','racing_rival'].includes(relationship(r))).map(r=>r.name)[0]||null;
  const summary = "P"+result.position+" at "+race.track+". "+fmtMoney(result.prize||0)+" earned.";

  state.raceHistory.push({
    season:state.season,week:state.week-1,seriesId,seriesShort:s.short,
    pos:result.position,fs:result.fieldSize,points:pts,prize:result.prize||0,
    track:race.track,dnf:result.dnf,dq:result.dq||false,fans:fanGain,repGain,
    closeFinishes:closeFinishes.length,summary,
  });
  race.result.summary=summary;
  if(state.raceHistory.length>500)state.raceHistory=state.raceHistory.slice(-500);

  if(contract){
    contract.racesCompleted++;
    contract.earnings+=driverPrize;
  }

  const cc=state.carCondition||{engine:100,suspension:100,chassis:100,tires:100,brakes:100};
  const hardRace=result.position<=5;
  const incidentRace=(result.incidentDrivers||[]).length>0||result.dnf;
  state.carCondition.tires=clamp(cc.tires-rand(8,14)-(hardRace?5:0),0,100);
  state.carCondition.brakes=clamp(cc.brakes-rand(4,8)-(hardRace?4:0),0,100);
  state.carCondition.engine=clamp(cc.engine-rand(3,7)-(result.dnf?40:0),0,100);
  state.carCondition.chassis=clamp(cc.chassis-rand(2,5)-(incidentRace?rand(8,15):0),0,100);
  state.carCondition.suspension=clamp(cc.suspension-rand(3,7)-(incidentRace?rand(10,20):0),0,100);

  if(Math.random()<0.10){
    const d=DRAMA[rand(0,DRAMA.length-1)];
    state.dramaQueue.push({...d,id:d.id+uid()});
  }

  if(state.week%6===0){
    const fresh=generateOffers(state.reputation,state.fans);
    fresh.forEach(o=>{if(!state.pendingOffers.find(p=>p.seriesId===o.seriesId))state.pendingOffers.push(o);});
  }

  checkMilestones(state);
  state.driverLevel=calcDriverLevel(state);

  const posStr=result.dq?'DQ':result.dnf?'DNF':`P${result.position}/${result.fieldSize}`;
  addLog(state,`${s.short} R${race.round} @ ${race.track}: ${posStr} | +${pts}pts | ${fmtMoney(result.prize||0)}`);
}

function checkMilestones(state){
  if(!state.milestones)state.milestones=[];
  MILESTONE_DEFS.forEach(def=>{
    if(state.milestones.find(m=>m.id===def.id))return;
    try{if(def.check(state)){
      state.milestones.push({id:def.id,season:state.season,week:state.week});
      state.dramaQueue.push({id:'ms_'+def.id,title:`🏅 ${def.label}`,effect:'none',desc:`Milestone: ${def.label}. ${def.desc}`,valence:'good'});
      addLog(state,`Milestone: ${def.label}`);
    }}catch(e){}
  });
}

function advanceSeason(state){
  const merch=calcMerchRevenue(state.fans);
  state.money+=merch;state.totalMerchRevenue=(state.totalMerchRevenue||0)+merch;
  if(merch>0)addLog(state,`Season merch revenue: ${fmtMoney(merch)}`);

  state.sponsors=state.sponsors.map(sp=>({...sp,seasonsLeft:sp.seasonsLeft-1})).filter(sp=>{
    if(sp.seasonsLeft<=0){addLog(state,`${sp.brand} sponsorship ended.`);return false;}return true;
  });

  state.contracts.forEach(c=>{c.seasonsCompleted++;c.racesCompleted=0;c.earnings=0;c.missedFinishWarnings=0;});
  state.contracts=state.contracts.filter(c=>{
    if(c.seasonsCompleted>=c.termSeasons){addLog(state,`${getSeries(c.seriesId).short} contract with ${c.team} expired.`);return false;}return true;
  });

  state.season++;state.week=1;state.schedules={};state.championshipPoints={};state.seriesFields={};
  state.sponsorOffers=[];state.offTrackDone=[];

  Object.keys(state.carCondition||{}).forEach(k=>{state.carCondition[k]=Math.min(100,(state.carCondition[k]||0)+35);});

  state.offseasonOffers=generateOffers(state.reputation,state.fans).map(o=>({...o,expiresIn:3,freeAgency:true}));
  state.offseasonPhase=true;state.pendingOffers=[];
  state.driverAttrPoints=(state.driverAttrPoints||0)+1;
  state.driverLevel=calcDriverLevel(state);

  checkMilestones(state);
  addLog(state,`--- Season ${state.season} begins. ---`);
}

function buildSeasonSummary(state){
  const championships=[];
  Object.entries(state.championshipPoints||{}).forEach(([sid,myPts])=>{
    const s=getSeries(sid);if(!s)return;
    const field=state.seriesFields[sid]||{};
    const rows=[{name:state.driverName,points:myPts,isPlayer:true},...Object.entries(field).map(([n,d])=>({name:n,points:d.points}))].sort((a,b)=>b.points-a.points);
    const pos=rows.findIndex(r=>r.isPlayer)+1;
    const trophy=TROPHY_TIERS.find(t=>pos<=t.minPos)||TROPHY_TIERS[TROPHY_TIERS.length-1];
    championships.push({seriesId:sid,seriesName:s.name,seriesColor:s.color,position:pos,points:myPts,fieldSize:rows.length,trophy});
  });
  let totalRaces=0,wins=0,top5s=0,totalPrize=0;
  state.raceHistory.filter(r=>r.season===state.season).forEach(r=>{totalRaces++;if(!r.dnf&&!r.dq&&r.pos===1)wins++;if(!r.dnf&&!r.dq&&r.pos<=5)top5s++;totalPrize+=r.prize||0;});
  return {championships,totalRaces,wins,top5s,totalPrize,season:state.season,rep:state.reputation,fans:state.fans,money:state.money};
}

function generateSeasonNarrative(state) {
  return "Season "+state.season+" complete. Review your results above.";
}

function saveGame(){if(G)localStorage.setItem('ft_sim_save',JSON.stringify(G));}
function loadGame(){
  const raw=localStorage.getItem('ft_sim_save');
  if(raw){
    try{
      G=JSON.parse(raw);
      if(!G.driverAttrs)G.driverAttrs=initDriverAttrs();
      if(G.driverAttrPoints===undefined)G.driverAttrPoints=0;
      if(!G.driverPerks)G.driverPerks=[];
      if(!G.carUpgrades)G.carUpgrades=initCarUpgrades();
      if(G.driverLevel===undefined)G.driverLevel=0;
      if(!G.carCondition)G.carCondition={engine:100,suspension:100,chassis:100,tires:100,brakes:100};
      if(!G.milestones)G.milestones=[];
      if(!G.seasonHistory)G.seasonHistory=[];
      return true;
    }catch(e){}
  }
  return false;
}

function exportSave(){
  const blob=new Blob([JSON.stringify(G,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`ft-sim-s${G.season}.json`;a.click();
}

function importSave(file){
  const r=new FileReader();
  r.onload=e=>{try{G=JSON.parse(e.target.result);saveGame();showGame();}catch(e){alert('Invalid save file.');}};
  r.readAsText(file);
}
</script>
<script>
// ═══════════════════════════════════════════════════════════════════════
// UI RENDERING & MODALS
// ═══════════════════════════════════════════════════════════════════════

let G = null;
let activeTab = 'dashboard';

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs){for(const[k,v]of Object.entries(attrs)){if(v==null)continue;if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='className')el.className=v;else if(k==='disabled')el.disabled=!!v;else if(k==='value')el.value=v;else if(k==='placeholder')el.placeholder=v;else if(k==='type')el.type=v;else el.setAttribute(k,v);}}
  for(const c of children.flat()){if(c==null||c===false)continue;el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);}
  return el;
}
const $=id=>document.getElementById(id);
const frag=(...nodes)=>{const f=document.createDocumentFragment();nodes.flat().forEach(n=>n&&f.appendChild(n));return f;};

function badge(text,color){color=color||'#64748B';return h('span',{className:'badge',style:{color,borderColor:color+'55',background:color+'20'}},text);}
function mkBtn(text,cls,onClick,disabled){return h('button',{className:'btn '+cls,onClick,disabled:!!disabled},text);}
function statBar(label,value,max,color){max=max||100;color=color||'#F59E0B';const pct=Math.min(100,Math.round((value/max)*100));return h('div',{className:'stat-bar'},h('div',{className:'sb-row'},h('span',{className:'sb-lbl'},label),h('span',{className:'sb-val'},Math.round(value))),h('div',{className:'sb-track'},h('div',{className:'sb-fill',style:{width:pct+'%',background:color}})));}
function cardTitle(text){return h('div',{className:'card-title'},text);}
function accent(color){return h('div',{className:'accent',style:{background:color}});}
function miniStatBox(label,value,color){return h('div',{style:{background:'#060A10',borderRadius:'8px',padding:'12px',border:'1px solid #1E2433'}},h('div',{style:{fontSize:'12px',color:'#94A3B8',textTransform:'uppercase',letterSpacing:'0.08em'}},label),h('div',{style:{fontSize:'22px',fontWeight:900,color:color||'#E5E7EB',marginTop:'3px'}},value));}

function showToast(msg, color){
  const c=$('toast-container');
  const t=h('div',{className:'toast',style:{borderLeftColor:color||'#F59E0B',borderLeftWidth:'3px'}},msg);
  c.appendChild(t);setTimeout(()=>t.remove(),3500);
}

const TABS = [
  {id:'dashboard',label:'Dashboard'},
  {id:'contracts',label:'Contracts'},
  {id:'schedule',label:'Schedule'},
  {id:'rivals',label:'Rivals'},
  {id:'standings',label:'Standings'},
  {id:'business',label:'Business'},
  {id:'drivers',label:'Driver RPG'},
  {id:'tracks',label:'Car Upgrades'},
  {id:'log',label:'Log'},
];

function renderTabs(){
  const c=$('tabs');c.innerHTML='';
  TABS.forEach(t=>{
    let bc=0;
    if(t.id==='contracts')bc=(G.pendingOffers||[]).length+(G.offseasonOffers||[]).length;
    if(t.id==='business')bc=(G.dramaQueue||[]).length+(G.sponsorOffers||[]).length;
    if(t.id==='drivers')bc=G.driverAttrPoints>0?G.driverAttrPoints:0;
    const tab=h('button',{className:'tab'+(activeTab===t.id?' active':''),onClick:()=>setTab(t.id)},t.label,bc>0?h('span',{className:'tab-badge'},bc):null);
    c.appendChild(tab);
  });
}

function setTab(id){activeTab=id;renderTabs();renderContent();}

function renderHeader(){
  $('header').innerHTML='';
  $('header').appendChild(frag(
    h('div',null,
      h('div',{className:'driver-sub'},'Full Throttle SIM · '+APP_VERSION),
      h('div',{className:'driver-name'},G.driverName),
    ),
    h('div',{className:'hdr-stats'},
      ...[['Season',G.season],['Week',G.week],['Money',fmtMoney(G.money)],['Fans',fmtFans(G.fans)],['Rep',G.reputation]]
        .map(([l,v])=>h('div',{className:'hdr-stat'},h('div',{className:'val'},v),h('div',{className:'lbl'},l)))
    )
  ));
}

function render(){renderHeader();renderTabs();renderContent();}

function renderContent(){
  const c=$('content');c.innerHTML='';
  const page=h('div',{className:'page'});
  const map={dashboard:renderDashboard,contracts:renderContracts,schedule:renderSchedule,rivals:renderRivals,standings:renderStandings,business:renderBusiness,drivers:renderDriverRPG,tracks:renderCarUpgrades,log:renderLog};
  if(map[activeTab])page.appendChild(map[activeTab]());
  c.appendChild(page);
}

function renderDashboard(){
  const f=document.createDocumentFragment();
  f.appendChild(h('div',{className:'page-title'},'Dashboard'));
  
  const card=h('div',{className:'card'});
  card.appendChild(h('div',{style:{fontSize:'18px',fontWeight:800,marginBottom:'12px'}},'Welcome to Full Throttle SIM'));
  card.appendChild(h('div',{style:{fontSize:'14px',color:'#94A3B8',marginBottom:'8px'}},'Season: '+G.season+' | Week: '+G.week));
  card.appendChild(h('div',{style:{fontSize:'14px',color:'#94A3B8'}},'Money: '+fmtMoney(G.money)+' | Fans: '+fmtFans(G.fans)+' | Rep: '+G.reputation));
  
  if(G.contracts.length){
    card.appendChild(h('div',{style:{marginTop:'16px',fontSize:'14px',fontWeight:700}},'Active Contracts:'));
    G.contracts.forEach(c=>{
      const s=getSeries(c.seriesId);
      card.appendChild(h('div',{style:{fontSize:'13px',color:'#94A3B8',marginTop:'4px'}},s.short+' - '+c.team));
    });
  }
  
  f.appendChild(card);
  return f;
}

function renderContracts(){
  const f=document.createDocumentFragment();
  f.appendChild(h('div',{className:'page-title'},'Contracts'));
  f.appendChild(h('div',{className:'page-sub'},'Sign contracts or run independent.'));
  
  if(!G.pendingOffers.length){
    f.appendChild(h('div',{className:'card',style:{textAlign:'center',padding:'28px',color:'#94A3B8'}},'No offers right now.'));
  }
  
  return f;
}

function renderSchedule(){
  const f=document.createDocumentFragment();
  f.appendChild(h('div',{className:'page-title'},'Schedule'));
  
  if(!G.contracts.length){
    f.appendChild(h('div',{className:'card',style:{textAlign:'center',padding:'24px',color:'#94A3B8'}},'No active contracts.'));
  } else {
    G.contracts.forEach(contract=>{
      const s=getSeries(contract.seriesId);
      const sched=G.schedules[contract.seriesId]||[];
      const nextIdx=sched.findIndex(r=>!r.result);
      const nextRace=nextIdx>=0?sched[nextIdx]:null;
      
      const card=h('div',{className:'card'});
      card.appendChild(h('div',{style:{fontSize:'18px',fontWeight:800,marginBottom:'8px'}},s.name));
      
      if(nextRace){
        card.appendChild(h('div',{style:{fontSize:'14px',color:'#94A3B8',marginBottom:'12px'}},'Next: '+nextRace.track));
        card.appendChild(mkBtn('Race →','btn btn-success',()=>openSimRaceModal(contract.seriesId,nextIdx)));
      } else {
        card.appendChild(h('div',{style:{fontSize:'14px',color:'#10B981'}},'Season complete!'));
      }
      
      f.appendChild(card);
    });
  }
  
  return f;
}

function renderRivals(){const f=document.createDocumentFragment();f.appendChild(h('div',{className:'page-title'},'Rivals'));return f;}
function renderStandings(){const f=document.createDocumentFragment();f.appendChild(h('div',{className:'page-title'},'Standings'));return f;}
function renderBusiness(){const f=document.createDocumentFragment();f.appendChild(h('div',{className:'page-title'},'Business'));return f;}
function renderDriverRPG(){const f=document.createDocumentFragment();f.appendChild(h('div',{className:'page-title'},'Driver RPG'));return f;}
function renderCarUpgrades(){const f=document.createDocumentFragment();f.appendChild(h('div',{className:'page-title'},'Car Upgrades'));return f;}
function renderLog(){const f=document.createDocumentFragment();f.appendChild(h('div',{className:'page-title'},'Log'));return f;}

function openModal(content){
  const box=$('modal-box');
  box.innerHTML='';
  box.appendChild(content);
  $('modal-overlay').classList.remove('hidden');
}

function closeModal(){
  $('modal-overlay').classList.add('hidden');
  $('modal-box').innerHTML='';
}

function openSimQualModal(seriesId, raceIdx){
  const s=getSeries(seriesId);
  const sched=G.schedules[seriesId]||[];
  const race=sched[raceIdx];
  const fieldSize=SERIES_FIELD_SIZE[seriesId]||20;
  const scenario=QUALI_SCENARIOS[rand(0,QUALI_SCENARIOS.length-1)];

  let selectedModifier=null;
  let selectedChoice=null;

  function build(){
    const wrap=h('div',null);
    wrap.appendChild(h('div',{className:'modal-title'},'Qualifying'));
    wrap.appendChild(h('div',{className:'modal-sub'},race.track));

    const scene=h('div',{className:'sim-scene'});
    scene.appendChild(h('div',{className:'sim-narrative'},scenario.scene));

    if(selectedChoice===null){
      const choiceWrap=h('div',{className:'sim-choices'});
      scenario.choices.forEach((choice,i)=>{
        const btn=h('button',{className:'sim-choice-btn',onClick:()=>{
          selectedModifier=choice.modifier;
          selectedChoice=i;
          build();
        }},choice.icon+' '+choice.label);
        choiceWrap.appendChild(btn);
      });
      scene.appendChild(choiceWrap);
    } else {
      const result=simulateQualifying(G,seriesId,raceIdx);
      const adjustedPos=clamp(Math.round(result.position*(2-selectedModifier)),1,fieldSize);
      
      scene.appendChild(h('div',{style:{fontSize:'18px',fontWeight:800,color:'#F59E0B',marginTop:'12px'}},'P'+adjustedPos));
      
      const saveBtn=mkBtn('Confirm — P'+adjustedPos,'btn btn-primary',()=>{
        sched[raceIdx].qualifying={position:adjustedPos,pole:adjustedPos===1};
        if(adjustedPos===1)G.poles++;
        saveGame();
        closeModal();
        render();
      });
      scene.appendChild(saveBtn);
    }

    wrap.appendChild(scene);
    const box=$('modal-box');box.innerHTML='';box.appendChild(wrap);
  }
  build();
  $('modal-overlay').classList.remove('hidden');
}

function openSimRaceModal(seriesId, raceIdx){
  const s=getSeries(seriesId);
  const sched=G.schedules[seriesId]||[];
  const race=sched[raceIdx];
  const fieldSize=SERIES_FIELD_SIZE[seriesId]||20;
  const qualPos=race.qualifying?.position||Math.floor(fieldSize*0.5);

  const numScenarios = rand(2,4);
  const ctx = buildSimContext(G, seriesId, raceIdx, qualPos, fieldSize, 1, numScenarios+1);
  const scenarios=pickScenarios(ctx,numScenarios,RACE_SCENARIOS);

  let narrativeDelta = 0;
  let currentScenario=0;
  let choiceResults=[];
  let currentPos=qualPos;

  function buildScenarioUI(){
    const wrap=h('div',null);
    wrap.appendChild(h('div',{className:'modal-title'},'Race: '+race.track));

    if(currentScenario<scenarios.length){
      const sc=scenarios[currentScenario];
      const ctxNow=buildSimContext(G,seriesId,raceIdx,currentPos,fieldSize,currentScenario+1,scenarios.length+1);
      const sceneText=typeof sc.scene==='function'?sc.scene(ctxNow):sc.scene;

      const sceneEl=h('div',{className:'sim-scene'});
      sceneEl.appendChild(h('div',{className:'sim-narrative'},sceneText));
      const choiceWrap=h('div',{className:'sim-choices'});

      sc.choices.forEach((choice,i)=>{
        const btn=h('button',{className:'sim-choice-btn',onClick:()=>{
          const isGood=Math.random()>0.4;
          const posDelta=isGood?Math.abs(choice.posModifier):-Math.abs(choice.posModifier);
          currentPos=clamp(currentPos-posDelta,1,fieldSize);
          
          const narrative=isGood?choice.narrativeResult.good:choice.narrativeResult.bad;
          choiceResults.push({posDelta,dnfRisk:isGood?0:choice.dnfRisk,fanBonus:isGood?choice.fanBonus:0,narrative,isGood});
          narrativeDelta += isGood ? Math.abs(posDelta||1) : -(Math.abs(posDelta||1)+1);

          currentScenario++;
          buildScenarioUI();
        }},choice.icon+' '+choice.label);
        choiceWrap.appendChild(btn);
      });

      sceneEl.appendChild(choiceWrap);
      wrap.appendChild(sceneEl);
    } else {
      const finalResult=resolveRace({
        basePos:qualPos,fieldSize,dnfRoll:Math.random(),
        dnfProb:0.10,baseSkill:5,lateRaceBonus:0,condBonus:0,
        narrativeDelta:clamp(Math.round(narrativeDelta*0.4),-3,3),
        qualPosition:currentPos,seriesId,raceIdx,
      },choiceResults);

      const pc=finalResult.dnf?'#EF4444':finalResult.position===1?'#F59E0B':'#CBD5E1';
      const label=finalResult.dnf?'DNF':'P'+finalResult.position;

      wrap.appendChild(h('div',{style:{fontSize:'48px',fontWeight:900,color:pc,textAlign:'center',marginBottom:'16px'}},label));
      wrap.appendChild(mkBtn('Confirm','btn btn-primary',()=>{
        processRaceResult(G,seriesId,raceIdx,finalResult);
        saveGame();
        closeModal();
        render();
      }));
    }

    const box=$('modal-box');box.innerHTML='';box.appendChild(wrap);
  }

  buildScenarioUI();
  $('modal-overlay').classList.remove('hidden');
}

function openSeasonEndModal(){
  const wrap=h('div',null);
  wrap.appendChild(h('div',{className:'modal-title'},'Season '+G.season+' Complete'));
  wrap.appendChild(mkBtn('Advance to Season '+(G.season+1),'btn btn-primary',()=>{
    advanceSeason(G);saveGame();closeModal();render();
  }));
  openModal(wrap);
}

function doGoIndependent(seriesId){
  const s=getSeries(seriesId);
  const contract={id:uid(),team:'Independent',seriesId,indie:true,entryFee:s.fee,prizeShare:1.0,termSeasons:1,seasonsCompleted:0,races:s.races,racesCompleted:0,earnings:0,crewPackage:'basic',teammates:[]};
  G.contracts.push(contract);
  if(!G.schedules[seriesId])G.schedules[seriesId]=generateSchedule(seriesId,G.trackPools);
  saveGame();render();
}

function doSignContract(offer){
  G.contracts.push(offer);
  if(!G.schedules[offer.seriesId])G.schedules[offer.seriesId]=generateSchedule(offer.seriesId,G.trackPools);
  G.pendingOffers=G.pendingOffers.filter(o=>o.id!==offer.id);
  saveGame();render();
}

function startNewGame(){
  localStorage.removeItem('ft_sim_save');
  location.reload();
}

function showGame(){
  $('setup-screen').classList.add('hidden');
  $('app').style.display='flex';
  render();
}

document.addEventListener('DOMContentLoaded',()=>{
  const sel=$('driver-state-input');
  if(sel&&sel.options.length===0){
    US_STATES.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=US_STATE_NAMES[s]||s;if(s==='NC')o.selected=true;sel.appendChild(o);});
  }

  if(loadGame()){showGame();return;}

  const form=$('setup-form');
  if(form){
    form.addEventListener('submit',e=>{
      e.preventDefault();
      const name=($('driver-name-input').value||'').trim();
      const state=($('driver-state-input').value)||'NC';
      if(!name)return;
      G=initState(name);
      G.homeState=state;
      G.driverAttrPoints=DRIVER_ATTR_POINTS_START-DRIVER_ATTRS.length*DRIVER_ATTR_DEFAULT;
      saveGame();
      showGame();
    });
  }

  $('modal-overlay').addEventListener('click',e=>{if(e.target===$('modal-overlay'))closeModal();});
});
</script>
</body>
</html>
